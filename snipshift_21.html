<script>
(function(){
"use strict";

/* =========================================================================
   CONFIG — named tunables, all in one place
   ========================================================================= */
const CONFIG = {
  MAX_UNDO_STEPS: 8,
  MAX_CANVAS_DIM: 2200,          // pasted images larger than this are downscaled to keep filters fast
  MAX_SEEDS_PER_CLASS: 600,      // cap on remembered keep/remove seed pixels per class
  SEED_OVERRIDE_MARGIN_PX: 6,    // extra radius (beyond half the brush width) within which a new mark clears out older, opposite-class seeds it was drawn over
  SAMPLE_STRIDE_PX: 3,           // min pixel distance between collected stroke sample points
  GRABCUT_ITERATIONS: 2,         // colour-model refit + re-cut passes — iteration 0 fits from your seeds only, each further pass refits from the FULL current labelling (standard GrabCut-style refinement)
  GMM_K: 5,                      // colour clusters per class in the lightweight GMM colour model
  GMM_FIT_ITERS: 5,              // k-means iterations used to fit each GMM
  GMM_VAR_FLOOR: 4,              // minimum per-cluster colour variance, so a near-uniform seed patch doesn't produce a degenerate near-zero-variance component
  PAIRWISE_GAMMA: 20,            // overall scale of the neighbour-similarity (smoothness) edge weights in the min-cut graph
  BG_DOMINANCE: 0.85,            // background "effort" is scaled down by this factor, so ambiguous/equidistant pixels lean toward removed rather than splitting evenly
  TRANSPARENT_PULL_STRENGTH: 1.5,// how much more strongly a low-alpha (removed) neighbour pulls the feather average down than a high-alpha neighbour pulls it up
  FEATHER_BLUR_PASSES: 1,        // asymmetric weighted-feather passes (see weightedFeather) applied BEFORE the final hard binarize — smooths the blocky edge upsampling leaves behind, doesn't leave any actual soft pixels behind
  BORDER_SEED_BAND_PX: 10,       // how far outside the box we sample for automatic background seeds
  INTERIOR_SEED_TARGET: 150,     // roughly how many automatic foreground seed points to take from the box interior
  INTERIOR_SEED_INSET_FRAC: 0.22,// fraction of box size kept clear of the interior seed grid, to reduce seeds landing on background peeking in near the edges
  MIN_ISLAND_AREA_PX: 30,        // connected regions smaller than this (in pixels) get merged into whichever class surrounds them — safety net; the min-cut itself rarely produces these, since a tiny island's cut perimeter usually costs more than its area saves
  COST_DOWNSAMPLE_MAX_DIM: 550,  // the min-cut graph is built on a working copy no larger than this on its longest side — cheap noise averaging for free, and this is what keeps the max-flow solve fast on a large pasted image
  PRE_BLUR_RADIUS: 1,            // mild box blur applied BEFORE the median filter, specifically to smooth JPEG 8x8 block seams so they don't register as real edges
  MEDIAN_FILTER_RADIUS: 3,       // radius (in downsampled pixels) of the median filter run on the working copy before classifying — kills fine texture (hair strands, skin texture, fabric weave, JPEG noise) without softening real edges the way a blur would
  MIN_ISLAND_AREA_SMALL_PX: 5,   // island cleanup run on the small working grid BEFORE upsampling — catches single-pixel noise at its actual scale, before upsampling inflates it past the full-resolution threshold above
  GHOST_OPACITY: 0.3,            // on-screen-only opacity of removed areas (shown greyscale), so you can see what to restore
  SKETCH_CONTRAST: 1.3,          // contrast boost applied on top of the colour-dodge+line base — kept moderate so it doesn't flatten the glow's tonal range
  SKETCH_COLORDODGE_BLUR_PX: 5,  // blur radius for the colour-dodge glow's inverted layer — fixed rather than tied to intensity, since intensity now purely controls the final photo<->sketch blend
  SKETCH_HATCH_SPACING_PX: 5,    // nominal gap between hatching strokes — also scales stroke length and cell size below
  SKETCH_HATCH_CELL_MULT: 2.2,   // cell size = spacing * this — how far apart the randomised stroke clusters are seeded
  SKETCH_HATCH_STROKES_PER_CELL: 2, // jittered strokes drawn per direction per cell
  SKETCH_HATCH_ANGLE_JITTER_DEG: 12, // +/- random rotation applied to each stroke around its base 45°/-45° direction
  SKETCH_HATCH_ALPHA: 0.28,      // how much each hatching hit darkens a pixel
  SKETCH_HATCH_LIGHT_THRESHOLD: 195, // regional tone above this = clean paper, no hatching at all
  SKETCH_HATCH_DARK_THRESHOLD: 110,  // regional tone at/below this = true cross-hatch (both directions); between the two thresholds = single-direction hatch only
  SKETCH_TONE_BLUR_MULT: 12,     // the hatching tone reference is blurred this many times XDOG_SIGMA_BASE's radius — deliberately much coarser than the line detection, so hatching reflects broad regions of shading, not per-pixel noise
  XDOG_SIGMA_BASE: 1.3,          // base Gaussian blur radius (px per 1000px of image) for XDoG line detection — larger = thicker/softer lines
  XDOG_K: 1.6,                   // ratio between XDoG's two blur radii (standard XDoG default)
  XDOG_TAU: 0.97,                // edge sensitivity — lower = more/bolder lines, higher = fewer/thinner lines
  XDOG_EPSILON: 0,               // DoG threshold below which a pixel starts becoming a line (0 is always edge-safe here — see the maths note on computeXDoGAndTone)
  XDOG_PHI: 10,                  // sharpness of the line edge — higher = harder/more graphic-novel, lower = softer/more pencil-like
  BUSY_OVERLAY_MIN_PIXELS: 120000, // below this working-grid size (~350x350), classification is fast enough that showing/yielding for a progress UI would only add needless latency
};

/* =========================================================================
   DOM refs
   ========================================================================= */
const $ = (id) => document.getElementById(id);
const displayCanvas = $("displayCanvas");
const overlayCanvas = $("overlayCanvas");
const canvasStack = $("canvasStack");
const dropHint = $("dropHint");
const statusHint = $("statusHint");
const busyOverlay = $("busyOverlay");
const busyLabel = $("busyLabel");
const busyBarFill = $("busyBarFill");
const dctx = displayCanvas.getContext("2d");
const octx = overlayCanvas.getContext("2d", { willReadFrequently: false });

// Toggles the busy state: shows/hides the loading card, disables toolbar +
// canvas interaction (classifyRegion() writes to the shared mask canvas
// asynchronously in stages — letting the person start a new stroke or click
// Undo mid-classify could race with that write and corrupt the mask).
function setBusy(isBusy){
  state.isClassifying = isBusy;
  document.body.classList.toggle("busy", isBusy);
  busyOverlay.classList.toggle("show", isBusy);
}

// Updates the loading card's text/progress, then yields to the browser so
// it actually gets a chance to paint before the next (synchronous, and
// potentially slow) chunk of work runs. A single requestAnimationFrame can
// sometimes resolve just before a paint; double-rAF is the standard trick
// to reliably wait until AFTER one has happened.
function uiTick(message, percent){
  busyLabel.textContent = message;
  busyBarFill.style.width = clamp(percent,0,100) + "%";
  return new Promise(resolve => requestAnimationFrame(()=>requestAnimationFrame(resolve)));
}

// Offscreen working canvases
const baseCanvas = document.createElement("canvas");
const bctx = baseCanvas.getContext("2d", { willReadFrequently: true });
const maskCanvas = document.createElement("canvas");
const mctx = maskCanvas.getContext("2d", { willReadFrequently: true });

/* =========================================================================
   State
   ========================================================================= */
const state = {
  hasImage: false,
  w: 0, h: 0,
  tool: "none",              // crop | bbox | markKeep | markRemove | brushAdd | brushRemove
  brushSize: 26,
  bbox: null,                // {x,y,w,h} in image space, or null
  fgSeeds: [],                 // pixel coords [x,y] collected/seeded as "definitely keep"
  bgSeeds: [],                 // pixel coords [x,y] collected/seeded as "definitely remove"
  undoStack: [],              // maskCanvas ImageData snapshots
  cropRect: null,             // pending crop rect while crop tool active
  fx: {
    brightness: 0, contrast: 0, sharpen: 0,
    saturation: 0, hue: 0, temp: 0,
    recolor: "none", duotoneA: "#1b1d22", duotoneB: "#c98a3b",
    art: "none",
    sketchIntensity: 60, posterizeLevels: 4,
  },
  pointer: { active:false, id:null, lastX:0, lastY:0, startX:0, startY:0 },
  showGhost: true,
  isClassifying: false,
};

/* =========================================================================
   Utility: colour space + image helpers
   ========================================================================= */
function rgbToLab(r,g,b){
  // sRGB -> linear
  let rl=r/255, gl=g/255, bl=b/255;
  rl = rl>0.04045 ? Math.pow((rl+0.055)/1.055,2.4) : rl/12.92;
  gl = gl>0.04045 ? Math.pow((gl+0.055)/1.055,2.4) : gl/12.92;
  bl = bl>0.04045 ? Math.pow((bl+0.055)/1.055,2.4) : bl/12.92;
  // linear -> XYZ (D65)
  let x = rl*0.4124 + gl*0.3576 + bl*0.1805;
  let y = rl*0.2126 + gl*0.7152 + bl*0.0722;
  let z = rl*0.0193 + gl*0.1192 + bl*0.9505;
  x/=0.95047; z/=1.08883;
  const f = (t)=> t>0.008856 ? Math.cbrt(t) : (7.787*t + 16/116);
  const fx=f(x), fy=f(y), fz=f(z);
  return [ (116*fy)-16, 500*(fx-fy), 200*(fy-fz) ]; // L,a,b
}
function clamp(v,lo,hi){ return v<lo?lo:(v>hi?hi:v); }

function loadImageFromBlob(blob){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload = ()=>resolve(img);
    img.onerror = reject;
    img.src = URL.createObjectURL(blob);
  });
}

function setImage(img){
  let w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
  const maxDim = Math.max(w,h);
  if (maxDim > CONFIG.MAX_CANVAS_DIM){
    const scale = CONFIG.MAX_CANVAS_DIM / maxDim;
    w = Math.round(w*scale); h = Math.round(h*scale);
  }
  state.hasImage = true;
  state.w = w; state.h = h;
  baseCanvas.width = w; baseCanvas.height = h;
  bctx.clearRect(0,0,w,h);
  bctx.drawImage(img,0,0,w,h);

  maskCanvas.width = w; maskCanvas.height = h;
  mctx.clearRect(0,0,w,h);
  mctx.fillStyle = "#fff";
  mctx.fillRect(0,0,w,h); // fully kept by default until a bbox/marking removes anything

  displayCanvas.width = w; displayCanvas.height = h;
  overlayCanvas.width = w; overlayCanvas.height = h;
  canvasStack.style.width = w+"px";
  canvasStack.style.height = h+"px";

  state.bbox = { x:0, y:0, w, h };
  state.undoStack = [];
  seedInitialSamples(state.bbox);
  resetFxOnly(false);
  dropHint.style.display = "none";
  setTool("markKeep");
  updateStatus();
  scheduleRender();
}

/* =========================================================================
   Undo
   ========================================================================= */
function pushUndo(){
  const snap = mctx.getImageData(0,0,state.w,state.h);
  state.undoStack.push(snap);
  if (state.undoStack.length > CONFIG.MAX_UNDO_STEPS) state.undoStack.shift();
}
function undo(){
  if (!state.undoStack.length) return;
  const snap = state.undoStack.pop();
  mctx.putImageData(snap,0,0);
  scheduleRender();
}

/* =========================================================================
   Tool switching
   ========================================================================= */
function setTool(tool){
  state.tool = tool;
  document.querySelectorAll(".tbtn[data-tool]").forEach(b=>{
    b.classList.toggle("active", b.dataset.tool === tool);
  });
  overlayCanvas.style.cursor = (tool==="brushAdd"||tool==="brushRemove") ? "none" : "crosshair";
  updateStatus();
  updateCropButtonLabel();
}
function hasValidCropRect(){
  return state.tool==="crop" && !!state.cropRect && Math.abs(state.cropRect.w)>=4 && Math.abs(state.cropRect.h)>=4;
}
function updateCropButtonLabel(){
  $("toolCrop").textContent = hasValidCropRect() ? "Keep Crop" : "Crop";
}
function updateStatus(){
  if (!state.hasImage){ statusHint.textContent = "Paste an image to begin (Ctrl/Cmd+V)"; return; }
  const msgs = {
    none: "Choose a tool above.",
    crop: "Drag to select a crop area, then press Keep Crop (or Enter) to apply.",
    bbox: "Optional: drag a box to narrow the working area, then keep marking as usual.",
    markKeep: "Auto keep pen — draw a line or click to intelligently keep similar areas.",
    markRemove: "Auto remove pen — draw a line or click to intelligently remove similar areas.",
    brushAdd: "Keep pen — paints kept areas directly, wherever you draw.",
    brushRemove: "Remove pen — paints removed areas directly, wherever you draw.",
  };
  statusHint.textContent = msgs[state.tool] || "";
}

/* =========================================================================
   Pointer input — unified Pointer Events for mouse / touch / pen
   ========================================================================= */
let strokeSamplePts = []; // image-space points collected during the current mark stroke, for sampling

overlayCanvas.addEventListener("pointerdown", (e)=>{
  if (!state.hasImage || state.isClassifying) return;
  overlayCanvas.setPointerCapture(e.pointerId);
  const p = toImageCoords(e);
  state.pointer.active = true;
  state.pointer.id = e.pointerId;
  state.pointer.lastX = p.x; state.pointer.lastY = p.y;
  state.pointer.startX = p.x; state.pointer.startY = p.y;
  strokeSamplePts = [];

  if (state.tool === "crop" || state.tool === "bbox"){
    state.cropRect = { x:p.x, y:p.y, w:0, h:0 };
    drawOverlay();
  } else if (state.tool === "markKeep" || state.tool === "markRemove" || state.tool === "brushAdd" || state.tool === "brushRemove"){
    applyBrushAt(p.x, p.y);
    maybeSample(p.x, p.y);
    drawOverlay(p.x,p.y);
  }
  e.preventDefault();
}, {passive:false});

overlayCanvas.addEventListener("pointermove", (e)=>{
  const p = toImageCoords(e);
  if (!state.pointer.active){
    if (state.tool==="brushAdd"||state.tool==="brushRemove") drawOverlay(p.x,p.y);
    return;
  }
  if (state.tool === "crop" || state.tool === "bbox"){
    state.cropRect.w = p.x - state.cropRect.x;
    state.cropRect.h = p.y - state.cropRect.y;
    drawOverlay();
  } else if (state.tool === "markKeep" || state.tool === "markRemove"){
    strokeLine(state.pointer.lastX, state.pointer.lastY, p.x, p.y);
    maybeSample(p.x,p.y);
    drawOverlay(p.x,p.y);
  } else if (state.tool === "brushAdd" || state.tool === "brushRemove"){
    strokeLine(state.pointer.lastX, state.pointer.lastY, p.x, p.y);
    drawOverlay(p.x,p.y);
  }
  state.pointer.lastX = p.x; state.pointer.lastY = p.y;
  e.preventDefault();
}, {passive:false});

function endStroke(e){
  if (!state.pointer.active) return;
  state.pointer.active = false;
  try{ overlayCanvas.releasePointerCapture(state.pointer.id); }catch(_){}

  if (state.tool === "bbox"){
    finalizeBbox();
  } else if (state.tool === "crop"){
    drawOverlay(); // keep crop rect visible until Enter/Escape
  } else if (state.tool === "markKeep" || state.tool === "markRemove"){
    finalizeMarkStroke();
  } else if (state.tool === "brushAdd" || state.tool === "brushRemove"){
    pushUndo_delayed();
    scheduleRender();
  }
}
overlayCanvas.addEventListener("pointerup", endStroke);
overlayCanvas.addEventListener("pointercancel", endStroke);
overlayCanvas.addEventListener("pointerleave", (e)=>{ if(!state.pointer.active) drawOverlay(); });

function toImageCoords(e){
  const r = overlayCanvas.getBoundingClientRect();
  const scaleX = overlayCanvas.width / r.width;
  const scaleY = overlayCanvas.height / r.height;
  return {
    x: clamp((e.clientX-r.left)*scaleX, 0, state.w),
    y: clamp((e.clientY-r.top)*scaleY, 0, state.h),
  };
}

function maybeSample(x,y){
  const last = strokeSamplePts[strokeSamplePts.length-1];
  if (last){
    const dx=x-last[0], dy=y-last[1];
    if (dx*dx+dy*dy < CONFIG.SAMPLE_STRIDE_PX*CONFIG.SAMPLE_STRIDE_PX) return;
  }
  strokeSamplePts.push([x,y]);
}

// Undo snapshots for brush strokes are pushed once per stroke, right before the
// stroke's first edit, via brushUndoPendingGuard(); reset when the stroke ends.
let brushStrokeStarted = false;
function pushUndo_delayed(){ brushStrokeStarted = false; }
function brushUndoPendingGuard(){
  if (!brushStrokeStarted){ pushUndo(); brushStrokeStarted = true; }
}

// Single click/tap support for the add/remove paint brush (a dot, not a line)
function applyBrushAt(x,y){
  const tool = state.tool;
  if (tool === "brushAdd" || tool === "brushRemove"){
    brushUndoPendingGuard();
    mctx.save();
    mctx.fillStyle = "#fff";
    mctx.globalCompositeOperation = (tool === "brushAdd") ? "source-over" : "destination-out";
    mctx.beginPath(); mctx.arc(x,y,state.brushSize/2,0,Math.PI*2); mctx.fill();
    mctx.restore();
    scheduleRender();
  }
}

function strokeLine(x0,y0,x1,y1){
  const tool = state.tool;
  if (tool === "brushAdd" || tool === "brushRemove"){
    brushUndoPendingGuard();
    mctx.save();
    mctx.lineCap = "round"; mctx.lineJoin = "round";
    mctx.lineWidth = state.brushSize;
    mctx.strokeStyle = "#fff";
    mctx.globalCompositeOperation = (tool === "brushAdd") ? "source-over" : "destination-out";
    mctx.beginPath(); mctx.moveTo(x0,y0); mctx.lineTo(x1,y1); mctx.stroke();
    mctx.restore();
    scheduleRender();
  }
  // markKeep / markRemove strokes are visual-only on the overlay until finalized;
  // actual mask edits happen in finalizeMarkStroke() below.
}

// Seeds both classes automatically the moment a bounding box is set, so the
// very first Keep or Remove stroke a person draws already has both classes
// available and feeds real geodesic classification (see finalizeMarkStroke)
// instead of the direct-punch fallback. Background seeds come from a thin
// ring of pixels just outside the box (always genuinely background), or the
// four canvas corners if the box fills the whole image. Foreground seeds
// come from a sparse grid across the box interior — an imperfect guess (the
// box may be loose around the subject), but the same kind of rough initial
// assumption PowerPoint's own auto-guess makes, and it gets corrected as
// soon as real marks are drawn on top of it. Unlike v1-v4, these are stored
// as pixel COORDINATES, not colours — classifyRegion() reads colours fresh
// from the image when it builds the geodesic cost field.
function seedInitialSamples(r){
  state.fgSeeds = [];
  state.bgSeeds = [];
  const band = CONFIG.BORDER_SEED_BAND_PX;

  const stepX = Math.max(6, Math.round(r.w/16));
  const stepY = Math.max(6, Math.round(r.h/16));
  for (let x=r.x; x<=r.x+r.w; x+=stepX){
    pushSeedIfInBounds(state.bgSeeds, x, r.y-band/2);
    pushSeedIfInBounds(state.bgSeeds, x, r.y+r.h+band/2);
  }
  for (let y=r.y; y<=r.y+r.h; y+=stepY){
    pushSeedIfInBounds(state.bgSeeds, r.x-band/2, y);
    pushSeedIfInBounds(state.bgSeeds, r.x+r.w+band/2, y);
  }

  const inset = Math.min(r.w, r.h) * CONFIG.INTERIOR_SEED_INSET_FRAC;
  const innerW = Math.max(1, r.w-2*inset), innerH = Math.max(1, r.h-2*inset);
  const stride = Math.max(10, Math.round(Math.sqrt((innerW*innerH)/CONFIG.INTERIOR_SEED_TARGET)));
  for (let y=r.y+inset; y<=r.y+r.h-inset; y+=stride){
    for (let x=r.x+inset; x<=r.x+r.w-inset; x+=stride){
      pushSeedIfInBounds(state.fgSeeds, x, y);
    }
  }

  // Box fills the whole image (no exterior band to sample) — fall back to
  // the canvas corners as a rough background guess.
  if (state.bgSeeds.length === 0){
    for (const [x,y] of [[2,2],[state.w-3,2],[2,state.h-3],[state.w-3,state.h-3]]){
      pushSeedIfInBounds(state.bgSeeds, x, y);
    }
  }
  if (state.fgSeeds.length === 0){
    pushSeedIfInBounds(state.fgSeeds, r.x+r.w/2, r.y+r.h/2);
  }
}
function pushSeedIfInBounds(arr, x, y){
  const xi = Math.round(x), yi = Math.round(y);
  if (xi>=0 && yi>=0 && xi<state.w && yi<state.h) arr.push([xi,yi]);
}

// Returns a copy of `seeds` with any point within `radius` of any point in
// `nearPts` removed — used so a fresh mark overrides older, conflicting
// seeds in the same area instead of coexisting with them forever.
function removeSeedsNear(seeds, nearPts, radius){
  const r2 = radius*radius;
  return seeds.filter(([sx,sy]) => {
    for (const [px,py] of nearPts){
      const dx=sx-px, dy=sy-py;
      if (dx*dx+dy*dy <= r2) return false;
    }
    return true;
  });
}

function finalizeBbox(){
  brushStrokeStarted = false;
  const r = normalizeRect(state.cropRect);
  state.cropRect = null;
  if (r.w < 6 || r.h < 6) { drawOverlay(); return; }
  pushUndo();
  state.bbox = r;
  seedInitialSamples(r);
  // Naive initial guess: everything inside the box is kept, outside is removed.
  mctx.clearRect(0,0,state.w,state.h);
  mctx.fillStyle = "#fff";
  mctx.fillRect(r.x, r.y, r.w, r.h);
  drawOverlay();
  scheduleRender();
  setTool("markKeep");
}

async function finalizeMarkStroke(){
  brushStrokeStarted = false;
  if (strokeSamplePts.length === 0) return;
  const isKeep = state.tool === "markKeep";
  const targetArr = isKeep ? state.fgSeeds : state.bgSeeds;
  const pathPts = strokeSamplePts.slice();
  for (const [x,y] of strokeSamplePts){
    targetArr.push([Math.round(x), Math.round(y)]);
    if (targetArr.length > CONFIG.MAX_SEEDS_PER_CLASS) targetArr.shift();
  }
  strokeSamplePts = [];

  // A fresh mark should WIN over an older, conflicting one in the same
  // spot — e.g. Auto Remove-ing an area, then later Auto Keep-ing part of
  // it back. Without this, the original "definitely background" seeds from
  // the first stroke never go away, and keep hard-outvoting the new
  // "definitely foreground" seeds in every future classification, which
  // looks like the tool is refusing to re-evaluate that area at all. Any
  // opposite-class seed within roughly this stroke's brush width gets
  // dropped, so the new mark actually overrides rather than just competing.
  const overrideRadius = state.brushSize/2 + CONFIG.SEED_OVERRIDE_MARGIN_PX;
  if (isKeep){
    state.bgSeeds = removeSeedsNear(state.bgSeeds, pathPts, overrideRadius);
  } else {
    state.fgSeeds = removeSeedsNear(state.fgSeeds, pathPts, overrideRadius);
  }

  pushUndo();

  if (state.fgSeeds.length > 0 && state.bgSeeds.length > 0){
    await classifyRegion();
  } else {
    // Only one class exists so far — punch the stroke directly onto the mask
    // as an immediate, responsive fallback until both classes are available.
    const r = state.bbox || {x:0,y:0,w:state.w,h:state.h};
    mctx.save();
    mctx.beginPath(); mctx.rect(r.x,r.y,r.w,r.h); mctx.clip();
    mctx.lineCap = "round"; mctx.lineJoin = "round";
    mctx.lineWidth = state.brushSize;
    mctx.strokeStyle = "#fff";
    mctx.fillStyle = "#fff";
    mctx.globalCompositeOperation = isKeep ? "source-over" : "destination-out";
    mctx.beginPath();
    if (pathPts.length === 1){
      mctx.arc(pathPts[0][0], pathPts[0][1], state.brushSize/2, 0, Math.PI*2);
      mctx.fill();
    } else {
      mctx.moveTo(pathPts[0][0], pathPts[0][1]);
      for (let i=1;i<pathPts.length;i++) mctx.lineTo(pathPts[i][0], pathPts[i][1]);
      mctx.stroke();
    }
    mctx.restore();
  }
  drawOverlay();
  scheduleRender();
}

function normalizeRect(r){
  const x = Math.min(r.x, r.x+r.w), y = Math.min(r.y, r.y+r.h);
  return { x: Math.round(x), y: Math.round(y), w: Math.round(Math.abs(r.w)), h: Math.round(Math.abs(r.h)) };
}

/* =========================================================================
   Geodesic classification (background removal core)
   ========================================================================= */

/* =========================================================================
   Min-cut / max-flow graph engine (Dinic's algorithm)
   ========================================================================= */

// Builds the 4-connected grid graph's TOPOLOGY once (source + sink terminals,
// one edge per pixel to each, plus right/down neighbour edges). Grid
// connectivity is fully predictable, so degrees are computed in closed form
// and CSR adjacency arrays are filled directly with typed-array cursors —
// no array-of-arrays/push, which matters at ~300k+ nodes. Capacities are
// left at 0 here; classifyRegion() rewrites them in place every refinement
// iteration without needing to rebuild this structure.
function buildGridTopology(gw, gh){
  const n = gw*gh, SRC = n, SINK = n+1, numNodes = n+2;
  const degree = new Int32Array(numNodes);
  for (let p=0; p<n; p++){
    const x = p%gw, y = (p/gw)|0;
    degree[p] = 2 + (x<gw-1?1:0) + (x>0?1:0) + (y<gh-1?1:0) + (y>0?1:0);
  }
  degree[SRC] = n;
  degree[SINK] = n;

  const adjOffset = new Int32Array(numNodes+1);
  for (let i=0;i<numNodes;i++) adjOffset[i+1] = adjOffset[i] + degree[i];
  const adjList = new Int32Array(adjOffset[numNodes]);
  const cursor = adjOffset.slice(0, numNodes);

  const edgeTo = new Int32Array(adjOffset[numNodes]);
  const edgeRev = new Int32Array(adjOffset[numNodes]);
  const edgeCap = new Float64Array(adjOffset[numNodes]);
  let edgeCount = 0;
  function addEdge(u, v){
    const e1 = edgeCount++;
    edgeTo[e1] = v; edgeRev[e1] = e1+1;
    adjList[cursor[u]++] = e1;
    const e2 = edgeCount++;
    edgeTo[e2] = u; edgeRev[e2] = e1;
    adjList[cursor[v]++] = e2;
    return e1;
  }

  const srcEdge = new Int32Array(n), sinkEdge = new Int32Array(n);
  const rightEdge = new Int32Array(n).fill(-1), downEdge = new Int32Array(n).fill(-1);
  for (let p=0; p<n; p++){
    srcEdge[p] = addEdge(SRC, p);
    sinkEdge[p] = addEdge(p, SINK);
    const x = p%gw, y = (p/gw)|0;
    if (x<gw-1) rightEdge[p] = addEdge(p, p+1);
    if (y<gh-1) downEdge[p] = addEdge(p, p+gw);
  }

  return { numNodes, SRC, SINK, n, edgeTo, edgeRev, edgeCap, adjOffset, adjList, srcEdge, sinkEdge, rightEdge, downEdge };
}

// Dinic's max-flow algorithm: repeated BFS level-graph construction, then an
// iterative (non-recursive — this graph is large enough that a recursive
// DFS could blow the call stack) blocking-flow DFS per phase. Standard
// "path stack" implementation: advance along admissible edges, and on a
// dead end retreat one step AND advance that node's edge iterator, so the
// same dead edge is never retried this phase.
function solveMaxFlow(topo){
  const { numNodes, SRC, SINK, edgeTo, edgeCap, edgeRev, adjOffset, adjList } = topo;
  const level = new Int32Array(numNodes);
  const it = new Int32Array(numNodes);
  const queue = new Int32Array(numNodes);

  function bfs(){
    level.fill(-1);
    let qh=0, qt=0;
    level[SRC] = 0; queue[qt++] = SRC;
    while (qh<qt){
      const u = queue[qh++];
      for (let ei=adjOffset[u]; ei<adjOffset[u+1]; ei++){
        const e = adjList[ei], v = edgeTo[e];
        if (edgeCap[e] > 1e-9 && level[v] < 0){ level[v] = level[u]+1; queue[qt++] = v; }
      }
    }
    return level[SINK] >= 0;
  }

  function blockingFlow(){
    let total = 0;
    const path = [];
    let u = SRC;
    while (true){
      if (u === SINK){
        let bottleneck = Infinity;
        for (const e of path) if (edgeCap[e] < bottleneck) bottleneck = edgeCap[e];
        for (const e of path){ edgeCap[e] -= bottleneck; edgeCap[edgeRev[e]] += bottleneck; }
        total += bottleneck;
        let cut = path.length;
        for (let k=0;k<path.length;k++){ if (edgeCap[path[k]] <= 1e-9){ cut=k; break; } }
        path.length = cut;
        u = cut===0 ? SRC : edgeTo[path[cut-1]];
        continue;
      }
      let advanced = false;
      while (it[u] < adjOffset[u+1]-adjOffset[u]){
        const ei = adjOffset[u]+it[u], e = adjList[ei], v = edgeTo[e];
        if (edgeCap[e] > 1e-9 && level[v] === level[u]+1){ path.push(e); u=v; advanced=true; break; }
        it[u]++;
      }
      if (!advanced){
        if (path.length === 0) return total;
        path.pop();
        u = path.length===0 ? SRC : edgeTo[path[path.length-1]];
        it[u]++; // this edge led to a dead end — never try it again this phase
      }
    }
  }

  let flow = 0;
  while (bfs()){ it.fill(0); flow += blockingFlow(); }
  return flow;
}

// After solveMaxFlow(), every node reachable from SRC via edges with
// remaining residual capacity is on the source (foreground) side of the
// min-cut; everything else is background. This IS the segmentation —
// natively binary, no threshold or feather needed to make it so.
function extractSourceSide(topo){
  const { numNodes, SRC, edgeTo, edgeCap, adjOffset, adjList } = topo;
  const onSourceSide = new Uint8Array(numNodes);
  const queue = new Int32Array(numNodes);
  let qh=0, qt=0;
  onSourceSide[SRC] = 1; queue[qt++] = SRC;
  while (qh<qt){
    const u = queue[qh++];
    for (let ei=adjOffset[u]; ei<adjOffset[u+1]; ei++){
      const e = adjList[ei], v = edgeTo[e];
      if (edgeCap[e] > 1e-9 && !onSourceSide[v]){ onSourceSide[v]=1; queue[qt++]=v; }
    }
  }
  return onSourceSide;
}

// Lightweight GMM: k-means clustering over Lab colour points, then per-
// cluster mean/variance/mixture-weight computed directly from the final
// assignment (a fast, standard approximation to full EM fitting — this is
// close to what GrabCut itself does in practice: each pixel is assigned to
// its single best-matching component, not blended across all of them).
function fitGmmLite(points, k, iters, varFloor){
  const n = points.length;
  if (n === 0) return [];
  k = Math.min(k, n);
  const centroids = [];
  for (let i=0;i<k;i++) centroids.push(points[Math.floor(i*n/k)].slice());
  let assign = new Int32Array(n);
  for (let iter=0; iter<iters; iter++){
    for (let i=0;i<n;i++){
      const p = points[i];
      let best=0, bestD=Infinity;
      for (let c=0;c<centroids.length;c++){
        const cc=centroids[c];
        const dl=p[0]-cc[0], da=p[1]-cc[1], db=p[2]-cc[2];
        const d=dl*dl+da*da+db*db;
        if (d<bestD){ bestD=d; best=c; }
      }
      assign[i]=best;
    }
    const sums = centroids.map(()=>[0,0,0,0]);
    for (let i=0;i<n;i++){
      const p=points[i], c=assign[i];
      sums[c][0]+=p[0]; sums[c][1]+=p[1]; sums[c][2]+=p[2]; sums[c][3]++;
    }
    for (let c=0;c<centroids.length;c++){
      if (sums[c][3]>0) centroids[c]=[sums[c][0]/sums[c][3], sums[c][1]/sums[c][3], sums[c][2]/sums[c][3]];
    }
  }
  for (let i=0;i<n;i++){
    const p = points[i];
    let best=0, bestD=Infinity;
    for (let c=0;c<centroids.length;c++){
      const cc=centroids[c];
      const dl=p[0]-cc[0], da=p[1]-cc[1], db=p[2]-cc[2];
      const d=dl*dl+da*da+db*db;
      if (d<bestD){ bestD=d; best=c; }
    }
    assign[i]=best;
  }
  const comps = centroids.map(()=>({sum:0,count:0}));
  for (let i=0;i<n;i++){
    const p=points[i], c=assign[i], cc=centroids[c];
    const dl=p[0]-cc[0], da=p[1]-cc[1], db=p[2]-cc[2];
    comps[c].sum += dl*dl+da*da+db*db;
    comps[c].count++;
  }
  const gmm = [];
  for (let c=0;c<centroids.length;c++){
    if (comps[c].count===0) continue;
    const variance = Math.max(varFloor, comps[c].sum/(comps[c].count*3));
    gmm.push({ mean: centroids[c], variance, weight: comps[c].count/n });
  }
  return gmm;
}

// D(pixel, class) = min over components of the negative log-likelihood
// (isotropic Gaussian): -log(weight) + 1.5*log(variance) + 0.5*distSq/variance.
// Lower = better match to this class's colour model.
function unaryCost(L, A, B, gmm){
  let best = Infinity;
  for (const g of gmm){
    const dl=L-g.mean[0], da=A-g.mean[1], db=B-g.mean[2];
    const distSq = dl*dl+da*da+db*db;
    const cost = -Math.log(g.weight) + 1.5*Math.log(g.variance) + 0.5*distSq/g.variance;
    if (cost < best) best = cost;
  }
  return best;
}

// Converts full-image pixel coordinates to flat indices within a gw*gh grid
// anchored at (r.x, r.y) and scaled by `scale` (1 = full resolution, <1 for
// the downsampled working copy classifyRegion() floods on). Drops any seed
// that falls outside the grid.
function seedsToLocalIndices(seeds, r, scale, gw, gh){
  const out = [];
  for (const [gx, gy] of seeds){
    const lx = Math.round((gx - r.x) * scale);
    const ly = Math.round((gy - r.y) * scale);
    if (lx>=0 && ly>=0 && lx<gw && ly<gh) out.push(ly*gw + lx);
  }
  return out;
}

// In-place insertion sort of buf[0..n) — fast for the small windows a
// median filter uses (typically 9-25 elements), no per-pixel allocation.
function sortSmallWindow(buf, n){
  for (let i=1;i<n;i++){
    const v = buf[i];
    let j = i-1;
    while (j>=0 && buf[j]>v){ buf[j+1]=buf[j]; j--; }
    buf[j+1]=v;
  }
}

// Per-channel median filter over a [L,a,b, L,a,b, ...] array. Edge-preserving
// by nature (unlike a Gaussian blur): a pixel right next to a hard edge still
// takes its value from whichever side of the edge the majority of its
// neighbourhood sits on, so real object boundaries stay crisp while fine
// texture/noise within a region gets smoothed away.
// Simple unweighted box blur over a [L,a,b, ...] array, run BEFORE the
// median filter specifically to smooth JPEG block seams — an 8x8 DCT block
// boundary is a real, if usually small, colour jump, and it's uniform and
// grid-aligned enough that a median filter alone doesn't always fully
// absorb it. A quick blur first softens those seams so they read as noise
// (and get skipped by the geodesic edge-cost's noise floor) rather than a
// tiny fenced-off region of their own.
function boxBlurLab(labArr, w, h, radius){
  if (radius <= 0) return labArr;
  const out = new Float32Array(labArr.length);
  for (let y=0; y<h; y++){
    for (let x=0; x<w; x++){
      let sL=0, sA=0, sB=0, n=0;
      for (let dy=-radius; dy<=radius; dy++){
        const yy=y+dy; if (yy<0||yy>=h) continue;
        for (let dx=-radius; dx<=radius; dx++){
          const xx=x+dx; if (xx<0||xx>=w) continue;
          const idx=(yy*w+xx)*3;
          sL+=labArr[idx]; sA+=labArr[idx+1]; sB+=labArr[idx+2]; n++;
        }
      }
      const oi=(y*w+x)*3;
      out[oi]=sL/n; out[oi+1]=sA/n; out[oi+2]=sB/n;
    }
  }
  return out;
}

function medianFilterLab(labArr, w, h, radius){
  const out = new Float32Array(labArr.length);
  const winMax = (2*radius+1)*(2*radius+1);
  const bufL = new Float32Array(winMax), bufA = new Float32Array(winMax), bufB = new Float32Array(winMax);
  for (let y=0; y<h; y++){
    for (let x=0; x<w; x++){
      let n=0;
      for (let dy=-radius; dy<=radius; dy++){
        const yy=y+dy; if (yy<0||yy>=h) continue;
        for (let dx=-radius; dx<=radius; dx++){
          const xx=x+dx; if (xx<0||xx>=w) continue;
          const idx=(yy*w+xx)*3;
          bufL[n]=labArr[idx]; bufA[n]=labArr[idx+1]; bufB[n]=labArr[idx+2];
          n++;
        }
      }
      sortSmallWindow(bufL, n); sortSmallWindow(bufA, n); sortSmallWindow(bufB, n);
      const mid = n>>1;
      const oi=(y*w+x)*3;
      out[oi]=bufL[mid]; out[oi+1]=bufA[mid]; out[oi+2]=bufB[mid];
    }
  }
  return out;
}

// Bilinear-upsamples an alpha field from sw*sh to dw*dh. Used to bring the
// downsampled classification result back to full resolution before the
// existing island-cleanup/feather/binarize pipeline runs.
function upsampleAlpha(src, sw, sh, dw, dh){
  if (sw===dw && sh===dh) return src;
  const out = new Uint8ClampedArray(dw*dh);
  const sx = sw/dw, sy = sh/dh;
  for (let y=0; y<dh; y++){
    const fy = clamp((y+0.5)*sy - 0.5, 0, sh-1);
    const y0 = Math.floor(fy), y1 = Math.min(y0+1, sh-1), wy = fy-y0;
    for (let x=0; x<dw; x++){
      const fx = clamp((x+0.5)*sx - 0.5, 0, sw-1);
      const x0 = Math.floor(fx), x1 = Math.min(x0+1, sw-1), wx = fx-x0;
      const v00=src[y0*sw+x0], v10=src[y0*sw+x1], v01=src[y1*sw+x0], v11=src[y1*sw+x1];
      const top = v00*(1-wx) + v10*wx;
      const bot = v01*(1-wx) + v11*wx;
      out[y*dw+x] = Math.round(top*(1-wy) + bot*wy);
    }
  }
  return out;
}

async function classifyRegion(){
  const r = state.bbox;
  if (!r) return;

  const maxDim = Math.max(r.w, r.h);
  const scale = Math.min(1, CONFIG.COST_DOWNSAMPLE_MAX_DIM / maxDim);
  const gw = Math.max(1, Math.round(r.w*scale)), gh = Math.max(1, Math.round(r.h*scale));
  const n = gw*gh;

  const fgIdx = seedsToLocalIndices(state.fgSeeds, r, scale, gw, gh);
  const bgIdx = seedsToLocalIndices(state.bgSeeds, r, scale, gw, gh);
  if (!fgIdx.length || !bgIdx.length) return;

  // Large regions can take a second or more of pure CPU-bound synchronous
  // work — long enough to look like the tab has frozen. Below a size
  // threshold it's fast enough that showing (and yielding for) a progress
  // UI would only add needless latency, so skip it entirely in that case.
  const showProgress = n > CONFIG.BUSY_OVERLAY_MIN_PIXELS;
  if (showProgress) setBusy(true);
  async function tick(msg, pct){ if (showProgress) await uiTick(msg, pct); }

  try{
    await tick("Preparing image\u2026", 4);

    // Same preprocessing as before: downsample (cheap noise averaging, and
    // much faster to segment), pre-blur (smooths JPEG block seams), median
    // filter (kills remaining texture noise without softening real edges).
    const dsCanvas = document.createElement("canvas");
    dsCanvas.width = gw; dsCanvas.height = gh;
    const dsCtx = dsCanvas.getContext("2d", { willReadFrequently: true });
    dsCtx.imageSmoothingEnabled = true;
    dsCtx.imageSmoothingQuality = "high";
    dsCtx.drawImage(baseCanvas, r.x, r.y, r.w, r.h, 0, 0, gw, gh);
    const data = dsCtx.getImageData(0, 0, gw, gh).data;

    let labArr = new Float32Array(n*3);
    for (let p=0, di=0; p<n; p++, di+=4){
      const lab = rgbToLab(data[di], data[di+1], data[di+2]);
      const o = p*3;
      labArr[o]=lab[0]; labArr[o+1]=lab[1]; labArr[o+2]=lab[2];
    }
    labArr = boxBlurLab(labArr, gw, gh, CONFIG.PRE_BLUR_RADIUS);
    if (CONFIG.MEDIAN_FILTER_RADIUS > 0){
      labArr = medianFilterLab(labArr, gw, gh, CONFIG.MEDIAN_FILTER_RADIUS);
    }

    await tick("Building colour model\u2026", 12);

    // ---- GrabCut-style min-cut classification ----
    // This replaces the old geodesic-flood + colour-blend heuristic entirely.
    // Every pixel is a graph node connected to its 4 neighbours (edge weight =
    // how alike their colours are) and to two terminals, source/sink, with
    // weights from how well the pixel matches a foreground/background colour
    // model (a lightweight GMM fit from your marked seeds). A min-cut/max-flow
    // solve then finds the GLOBALLY cheapest way to split the whole graph into
    // two pieces — not a local greedy decision like the old flood, so a
    // same-coloured patch elsewhere in the region gets folded in correctly
    // even with no cheap spatial path to a seed, and small isolated islands
    // are intrinsically expensive (their boundary/perimeter cost isn't worth
    // paying to save a small area), so they mostly never form in the first
    // place rather than needing to be cleaned up after the fact.
    const topo = buildGridTopology(gw, gh);
    const fgSeedSet = new Set(fgIdx), bgSeedSet = new Set(bgIdx);

    // Adaptive edge-weight scale: beta is set from the average colour jump
    // between neighbouring pixels in THIS region, so the same GAMMA constant
    // behaves sensibly whether the image is low-contrast or high-contrast.
    let sumSq=0, cnt=0;
    for (let p=0; p<n; p++){
      const x=p%gw, y=(p/gw)|0, i=p*3;
      if (x<gw-1){ const j=(p+1)*3; const dl=labArr[i]-labArr[j],da=labArr[i+1]-labArr[j+1],db=labArr[i+2]-labArr[j+2]; sumSq+=dl*dl+da*da+db*db; cnt++; }
      if (y<gh-1){ const j=(p+gw)*3; const dl=labArr[i]-labArr[j],da=labArr[i+1]-labArr[j+1],db=labArr[i+2]-labArr[j+2]; sumSq+=dl*dl+da*da+db*db; cnt++; }
    }
    const beta = 1/(2*Math.max(1e-6, sumSq/Math.max(1,cnt)));

    let currentFg = fgIdx, currentBg = bgIdx, onSourceSide;
    for (let iter=0; iter<CONFIG.GRABCUT_ITERATIONS; iter++){
      const iterPct = 15 + (iter/CONFIG.GRABCUT_ITERATIONS)*70;
      await tick(`Solving (pass ${iter+1} of ${CONFIG.GRABCUT_ITERATIONS})\u2026`, iterPct);

      const fgColors = currentFg.map(i => [labArr[i*3], labArr[i*3+1], labArr[i*3+2]]);
      const bgColors = currentBg.map(i => [labArr[i*3], labArr[i*3+1], labArr[i*3+2]]);
      const fgGmm = fitGmmLite(fgColors, CONFIG.GMM_K, CONFIG.GMM_FIT_ITERS, CONFIG.GMM_VAR_FLOOR);
      const bgGmm = fitGmmLite(bgColors, CONFIG.GMM_K, CONFIG.GMM_FIT_ITERS, CONFIG.GMM_VAR_FLOOR);

      for (let p=0; p<n; p++){
        const i = p*3, L=labArr[i], A=labArr[i+1], B=labArr[i+2];
        // Background "effort" is scaled down, so a pixel that's a genuinely
        // ambiguous match to both models leans toward removed rather than
        // sitting exactly on the fence.
        let capS = unaryCost(L,A,B,bgGmm) * CONFIG.BG_DOMINANCE; // cost of labelling this pixel background
        let capT = unaryCost(L,A,B,fgGmm);                       // cost of labelling this pixel foreground
        if (fgSeedSet.has(p)){ capS = 1e9; capT = 0; }
        if (bgSeedSet.has(p)){ capS = 0; capT = 1e9; }
        topo.edgeCap[topo.srcEdge[p]] = capS;
        topo.edgeCap[topo.edgeRev[topo.srcEdge[p]]] = 0;
        topo.edgeCap[topo.sinkEdge[p]] = capT;
        topo.edgeCap[topo.edgeRev[topo.sinkEdge[p]]] = 0;
        if (topo.rightEdge[p] >= 0){
          const j=(p+1)*3;
          const dl=L-labArr[j], da=A-labArr[j+1], db=B-labArr[j+2];
          const w = CONFIG.PAIRWISE_GAMMA * Math.exp(-beta*(dl*dl+da*da+db*db));
          topo.edgeCap[topo.rightEdge[p]] = w;
          topo.edgeCap[topo.edgeRev[topo.rightEdge[p]]] = w;
        }
        if (topo.downEdge[p] >= 0){
          const j=(p+gw)*3;
          const dl=L-labArr[j], da=A-labArr[j+1], db=B-labArr[j+2];
          const w = CONFIG.PAIRWISE_GAMMA * Math.exp(-beta*(dl*dl+da*da+db*db));
          topo.edgeCap[topo.downEdge[p]] = w;
          topo.edgeCap[topo.edgeRev[topo.downEdge[p]]] = w;
        }
      }

      solveMaxFlow(topo);
      onSourceSide = extractSourceSide(topo);

      // Refit next iteration's colour models from the FULL current labelling
      // (not just the original seeds) — standard GrabCut-style refinement.
      // Hard seed pixels keep their user-assigned label regardless.
      if (iter < CONFIG.GRABCUT_ITERATIONS-1){
        currentFg = []; currentBg = [];
        for (let p=0; p<n; p++) (onSourceSide[p] ? currentFg : currentBg).push(p);
      }
    }

    await tick("Cleaning up edges\u2026", 90);

    const smallAlpha = new Uint8ClampedArray(n);
    for (let p=0; p<n; p++) smallAlpha[p] = onSourceSide[p] ? 255 : 0;

    // Clean up noise-scale islands HERE, on the small working grid, before
    // upsampling — a single stray pixel here is genuinely single-pixel noise,
    // but after bilinear upsampling back to full resolution it can become a
    // blob comfortably larger than the full-res cleanup threshold below, and
    // survive. Catching it at its real scale first closes that gap. (The
    // min-cut itself should rarely produce these — small islands cost more
    // in cut perimeter than they save in unary cost — but this stays on as a
    // safety net.)
    const smallCleaned = removeSmallIslands(smallAlpha, gw, gh, CONFIG.MIN_ISLAND_AREA_SMALL_PX);

    const alpha = upsampleAlpha(smallCleaned, gw, gh, r.w, r.h);
    const cleaned = removeSmallIslands(alpha, r.w, r.h, CONFIG.MIN_ISLAND_AREA_PX);

    // The feather pass only smooths the blocky edge that upsampling from a
    // downsampled grid leaves behind — it is never the final output. Every
    // pixel gets hard-snapped to fully kept or fully removed straight after,
    // and a second island pass mops up anything that snapping happened to
    // leave as a lone speck. This tool never leaves semi-transparent pixels
    // behind.
    let feathered = cleaned;
    for (let pass=0; pass<CONFIG.FEATHER_BLUR_PASSES; pass++){
      feathered = weightedFeather(feathered, r.w, r.h);
    }
    const binary = new Uint8ClampedArray(r.w*r.h);
    for (let p=0; p<r.w*r.h; p++) binary[p] = feathered[p] >= 128 ? 255 : 0;
    const finalAlpha = removeSmallIslands(binary, r.w, r.h, CONFIG.MIN_ISLAND_AREA_PX);

    const maskImg = mctx.getImageData(0,0,state.w,state.h);
    const mdata = maskImg.data;
    for (let y=0;y<r.h;y++){
      for (let x=0;x<r.w;x++){
        const srcIdx = y*r.w+x;
        const dstIdx = ((r.y+y)*state.w + (r.x+x))*4;
        mdata[dstIdx]=255; mdata[dstIdx+1]=255; mdata[dstIdx+2]=255;
        mdata[dstIdx+3]=finalAlpha[srcIdx];
      }
    }
    // outside bbox always fully removed
    mctx.putImageData(maskImg,0,0);
    mctx.save();
    mctx.globalCompositeOperation = "destination-in";
    mctx.fillStyle="#fff";
    mctx.beginPath(); mctx.rect(r.x,r.y,r.w,r.h); mctx.fill();
    mctx.restore();
  } finally {
    if (showProgress) setBusy(false);
  }
}

// Asymmetric feather: a low-alpha (removed) neighbour pulls the average down
// harder than a high-alpha (kept) neighbour pulls it up. This is what makes
// "definitely transparent" pixels carry more weight with their neighbours —
// applied at the edge-softening stage, on top of the BG_DOMINANCE bias
// already applied when building the min-cut's terminal costs above.
function weightedFeather(src, w, h){
  const out = new Uint8ClampedArray(src.length);
  const boost = CONFIG.TRANSPARENT_PULL_STRENGTH;
  for (let y=0;y<h;y++){
    for (let x=0;x<w;x++){
      let wsum=0, vsum=0;
      for (let dy=-1; dy<=1; dy++){
        const yy=y+dy; if (yy<0||yy>=h) continue;
        for (let dx=-1; dx<=1; dx++){
          const xx=x+dx; if (xx<0||xx>=w) continue;
          const v = src[yy*w+xx];
          const weight = 1 + boost*(255-v)/255;
          wsum += weight; vsum += v*weight;
        }
      }
      out[y*w+x] = vsum/wsum;
    }
  }
  return out;
}

// Flood-fills the (thresholded) alpha into connected foreground/background
// regions and merges any region smaller than `minArea` pixels into the
// class that surrounds it. This is what cleans up the "grid dot" artefacts
// that mis-placed automatic interior seeds can leave behind — a seed that
// happened to land on a patch of background produces one tiny isolated
// "kept" island, fully disconnected from the main subject, which this pass
// simply erases. Real subject detail stays untouched because it's part of
// one large connected mass, not a lone island.
function removeSmallIslands(alpha, w, h, minArea){
  const n = w*h;
  const visited = new Uint8Array(n);
  const out = alpha.slice();
  const stack = new Int32Array(n);
  const members = new Int32Array(n);

  for (let start=0; start<n; start++){
    if (visited[start]) continue;
    const isFg = alpha[start] > 127;
    let sp = 0, mp = 0;
    stack[sp++] = start;
    visited[start] = 1;
    members[mp++] = start;
    while (sp > 0){
      const idx = stack[--sp];
      const x = idx % w, y = (idx / w) | 0;
      if (x>0){ const ni=idx-1; if(!visited[ni] && (alpha[ni]>127)===isFg){ visited[ni]=1; stack[sp++]=ni; members[mp++]=ni; } }
      if (x<w-1){ const ni=idx+1; if(!visited[ni] && (alpha[ni]>127)===isFg){ visited[ni]=1; stack[sp++]=ni; members[mp++]=ni; } }
      if (y>0){ const ni=idx-w; if(!visited[ni] && (alpha[ni]>127)===isFg){ visited[ni]=1; stack[sp++]=ni; members[mp++]=ni; } }
      if (y<h-1){ const ni=idx+w; if(!visited[ni] && (alpha[ni]>127)===isFg){ visited[ni]=1; stack[sp++]=ni; members[mp++]=ni; } }
    }
    if (mp < minArea){
      const fillVal = isFg ? 0 : 255; // flip the island to whichever class surrounds it
      for (let k=0;k<mp;k++) out[members[k]] = fillVal;
    }
  }
  return out;
}

/* =========================================================================
   Overlay drawing (crosshair / bbox / marks preview)
   ========================================================================= */
function drawOverlay(brushX, brushY){
  octx.clearRect(0,0,state.w,state.h);
  updateCropButtonLabel();

  if (state.bbox && state.tool !== "crop"){
    octx.save();
    octx.strokeStyle = "rgba(201,138,59,0.9)";
    octx.setLineDash([6,4]);
    octx.lineWidth = 2;
    octx.strokeRect(state.bbox.x, state.bbox.y, state.bbox.w, state.bbox.h);
    octx.restore();
  }

  if ((state.tool === "crop" || state.tool === "bbox") && state.cropRect){
    const r = normalizeRect(state.cropRect);
    octx.save();
    octx.strokeStyle = state.tool==="crop" ? "#e9e8e4" : "#c98a3b";
    octx.lineWidth = 2;
    octx.setLineDash(state.tool==="crop" ? [] : [6,4]);
    octx.strokeRect(r.x,r.y,r.w,r.h);
    if (state.tool === "crop"){
      octx.fillStyle = "rgba(0,0,0,0.45)";
      octx.beginPath();
      octx.rect(0,0,state.w,state.h);
      octx.rect(r.x,r.y,r.w,r.h);
      octx.fill("evenodd");
    }
    octx.restore();
  }

  if (state.tool === "markKeep" && strokeSamplePts.length){
    drawStrokePreview(strokeSamplePts, "rgba(95,184,122,0.55)");
  } else if (state.tool === "markRemove" && strokeSamplePts.length){
    drawStrokePreview(strokeSamplePts, "rgba(224,104,138,0.55)");
  }

  if ((state.tool==="brushAdd"||state.tool==="brushRemove") && brushX!==undefined){
    octx.save();
    octx.strokeStyle = state.tool==="brushAdd" ? "#5fb87a" : "#e0688a";
    octx.lineWidth = 1.5;
    octx.beginPath();
    octx.arc(brushX, brushY, state.brushSize/2, 0, Math.PI*2);
    octx.stroke();
    octx.restore();
  }
}
function drawStrokePreview(pts, color){
  octx.save();
  octx.strokeStyle = color;
  octx.lineWidth = state.brushSize;
  octx.lineCap = "round"; octx.lineJoin = "round";
  octx.beginPath();
  octx.moveTo(pts[0][0], pts[0][1]);
  for (let i=1;i<pts.length;i++) octx.lineTo(pts[i][0], pts[i][1]);
  octx.stroke();
  octx.restore();
}

/* =========================================================================
   Crop apply / cancel
   ========================================================================= */
function applyCrop(){
  if (!state.cropRect) return;
  const r = normalizeRect(state.cropRect);
  if (r.w<4 || r.h<4){ state.cropRect=null; drawOverlay(); return; }
  const newBase = document.createElement("canvas");
  newBase.width = r.w; newBase.height = r.h;
  newBase.getContext("2d").drawImage(baseCanvas, r.x, r.y, r.w, r.h, 0,0, r.w, r.h);

  const newMask = document.createElement("canvas");
  newMask.width = r.w; newMask.height = r.h;
  newMask.getContext("2d").drawImage(maskCanvas, r.x, r.y, r.w, r.h, 0,0, r.w, r.h);

  state.w = r.w; state.h = r.h;
  baseCanvas.width = r.w; baseCanvas.height = r.h;
  bctx.drawImage(newBase,0,0);
  maskCanvas.width = r.w; maskCanvas.height = r.h;
  mctx.drawImage(newMask,0,0);

  displayCanvas.width = r.w; displayCanvas.height = r.h;
  overlayCanvas.width = r.w; overlayCanvas.height = r.h;
  canvasStack.style.width = r.w+"px";
  canvasStack.style.height = r.h+"px";

  state.bbox = { x:0, y:0, w:r.w, h:r.h };
  state.cropRect = null;
  state.undoStack = [];
  seedInitialSamples(state.bbox);
  setTool("markKeep");
  scheduleRender();
}
document.addEventListener("keydown", (e)=>{
  if (!state.hasImage) return;
  if (state.tool === "crop" && state.cropRect){
    if (e.key === "Enter"){ applyCrop(); e.preventDefault(); }
    if (e.key === "Escape"){ state.cropRect=null; drawOverlay(); e.preventDefault(); }
  }
  if ((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="z"){ undo(); e.preventDefault(); }
  if ((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="c"){ copyPngToClipboard(); e.preventDefault(); }
});

/* =========================================================================
   Composite / render pipeline
   ========================================================================= */
const workA = document.createElement("canvas");
const wactx = workA.getContext("2d", { willReadFrequently:true });
const maskedCanvas = document.createElement("canvas"); // clean, mask-applied result — this is what gets exported
const mkctx = maskedCanvas.getContext("2d");

function buildFilterString(fx){
  const parts = [];
  parts.push(`brightness(${1 + fx.brightness/100})`);
  parts.push(`contrast(${1 + fx.contrast/100})`);
  parts.push(`saturate(${clamp(1 + fx.saturation/100, 0, 3)})`);
  if (fx.hue) parts.push(`hue-rotate(${fx.hue}deg)`);
  if (fx.sharpen < 0){ parts.push(`blur(${(-fx.sharpen/100*4).toFixed(2)}px)`); }
  return parts.join(" ");
}

function renderComposite(){
  if (!state.hasImage) return;
  const fx = state.fx;
  const w = state.w, h = state.h;
  workA.width = w; workA.height = h;
  wactx.clearRect(0,0,w,h);
  wactx.filter = buildFilterString(fx);
  wactx.drawImage(baseCanvas, 0, 0);
  wactx.filter = "none";

  if (fx.temp !== 0){
    applyTemperature(wactx, w, h, fx.temp);
  }
  if (fx.sharpen > 0){
    applySharpen(wactx, w, h, fx.sharpen/100);
  }
  if (fx.recolor === "greyscale"){
    applyCssFilterInPlace(wactx, w, h, "grayscale(1)");
  } else if (fx.recolor === "sepia"){
    applyCssFilterInPlace(wactx, w, h, "sepia(0.85)");
  } else if (fx.recolor === "duotone"){
    applyDuotone(wactx, w, h, fx.duotoneA, fx.duotoneB);
  }

  applyArtisticEffect(wactx, w, h, fx);
  // workA now holds the fully effects-applied image, WITHOUT the mask —
  // this is the "ghost" layer, kept around so removed areas can be shown
  // faintly. Never exported directly.

  maskedCanvas.width = w; maskedCanvas.height = h;
  mkctx.clearRect(0,0,w,h);
  mkctx.drawImage(workA, 0, 0);
  mkctx.save();
  mkctx.globalCompositeOperation = "destination-in";
  mkctx.drawImage(maskCanvas, 0, 0);
  mkctx.restore();
  // maskedCanvas is now the clean, final cutout — this is what Copy/Download export.

  dctx.clearRect(0,0,w,h);
  if (state.showGhost){
    dctx.save();
    dctx.globalAlpha = CONFIG.GHOST_OPACITY;
    dctx.filter = "grayscale(1)";
    dctx.drawImage(workA, 0, 0);
    dctx.restore();
  }
  dctx.drawImage(maskedCanvas, 0, 0);
}

function applyCssFilterInPlace(ctx, w, h, filterStr){
  const tmp = document.createElement("canvas");
  tmp.width = w; tmp.height = h;
  const tctx = tmp.getContext("2d");
  tctx.filter = filterStr;
  tctx.drawImage(ctx.canvas, 0, 0);
  ctx.clearRect(0,0,w,h);
  ctx.drawImage(tmp,0,0);
}

function applyTemperature(ctx, w, h, temp){
  const img = ctx.getImageData(0,0,w,h);
  const d = img.data;
  const k = temp/100 * 40; // max +-40 per channel
  for (let i=0;i<d.length;i+=4){
    d[i]   = clamp(d[i]+k, 0, 255);
    d[i+2] = clamp(d[i+2]-k, 0, 255);
  }
  ctx.putImageData(img,0,0);
}

function applySharpen(ctx, w, h, amount){
  const src = ctx.getImageData(0,0,w,h);
  const s = src.data;
  const out = new Uint8ClampedArray(s.length);
  const kernel = [0,-1,0, -1,5,-1, 0,-1,0];
  for (let y=0;y<h;y++){
    for (let x=0;x<w;x++){
      const i = (y*w+x)*4;
      if (x===0||y===0||x===w-1||y===h-1){
        out[i]=s[i]; out[i+1]=s[i+1]; out[i+2]=s[i+2]; out[i+3]=s[i+3];
        continue;
      }
      for (let c=0;c<3;c++){
        let sum=0, k=0;
        for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++,k++){
          sum += s[((y+dy)*w+(x+dx))*4+c]*kernel[k];
        }
        out[i+c] = clamp(s[i+c]*(1-amount) + sum*amount, 0, 255);
      }
      out[i+3]=s[i+3];
    }
  }
  ctx.putImageData(new ImageData(out,w,h),0,0);
}

function applyDuotone(ctx, w, h, hexA, hexB){
  const a = hexToRgb(hexA), b = hexToRgb(hexB);
  const img = ctx.getImageData(0,0,w,h);
  const d = img.data;
  for (let i=0;i<d.length;i+=4){
    const lum = (0.299*d[i]+0.587*d[i+1]+0.114*d[i+2])/255;
    d[i]   = a[0] + (b[0]-a[0])*lum;
    d[i+1] = a[1] + (b[1]-a[1])*lum;
    d[i+2] = a[2] + (b[2]-a[2])*lum;
  }
  ctx.putImageData(img,0,0);
}
function hexToRgb(hex){
  const v = parseInt(hex.slice(1),16);
  return [(v>>16)&255, (v>>8)&255, v&255];
}

function applyArtisticEffect(ctx, w, h, fx){
  if (fx.art === "none") return;
  if (fx.art === "posterize"){
    posterize(ctx, w, h, fx.posterizeLevels);
  } else if (fx.art === "sketch"){
    sketch(ctx, w, h, fx.sketchIntensity/100, fx);
  }
}

function posterize(ctx, w, h, levels){
  const img = ctx.getImageData(0,0,w,h);
  const d = img.data;
  const step = 255/(levels-1);
  for (let i=0;i<d.length;i+=4){
    d[i]   = Math.round(Math.round(d[i]/step)*step);
    d[i+1] = Math.round(Math.round(d[i+1]/step)*step);
    d[i+2] = Math.round(Math.round(d[i+2]/step)*step);
  }
  ctx.putImageData(img,0,0);
}

function sketch(ctx, w, h, intensity, fx){
  // Snapshot the current (corrections/colour already applied) image before
  // touching ctx — this is both what XDoG reads from AND what `intensity`
  // blends back toward at the end.
  const original = document.createElement("canvas");
  original.width = w; original.height = h;
  original.getContext("2d").drawImage(ctx.canvas, 0, 0);

  // XDoG (eXtended Difference-of-Gaussians): a proper edge-detection
  // technique built for stylized line art. Two Gaussian blurs of the
  // grayscale image at different radii are subtracted; in flat colour the
  // two blurs agree and the difference stays harmless (see the maths note
  // in computeXDoGAndTone()), but right at a real edge they diverge,
  // producing a genuine line rather than a soft glow.
  const maxDim = Math.max(w,h);
  const sigma = clamp(CONFIG.XDOG_SIGMA_BASE * (maxDim/1000), 0.6, 6);
  const { lines, tone } = computeXDoGAndTone(ctx, w, h, sigma);

  const tmp = document.createElement("canvas");
  tmp.width = w; tmp.height = h;
  const tctx = tmp.getContext("2d");

  // Grayscale base.
  tctx.filter = "grayscale(1)";
  tctx.drawImage(original, 0, 0);
  tctx.filter = "none";

  // Classic colour-dodge pencil glow (the original v1 technique): invert
  // and blur that SAME grayscale, then colour-dodge-blend it back onto the
  // grayscale base. This is what actually gives a sketch its "drawn on
  // paper" tonal character — broadly brightened midtones with a natural
  // soft glow/definition gathering around edges — which a plain desaturated
  // copy doesn't have; it just looks like a grayscale photo.
  const inv = document.createElement("canvas");
  inv.width = w; inv.height = h;
  const ictx = inv.getContext("2d");
  ictx.filter = `grayscale(1) invert(1) blur(${CONFIG.SKETCH_COLORDODGE_BLUR_PX}px)`;
  ictx.drawImage(original, 0, 0);
  ictx.filter = "none";
  tctx.save();
  tctx.globalCompositeOperation = "color-dodge";
  tctx.drawImage(inv, 0, 0);
  tctx.restore();

  // Multiply the XDoG line art on top for crisp, well-defined edges the
  // colour-dodge glow alone can miss on subtler boundaries.
  const lineCanvas = document.createElement("canvas");
  lineCanvas.width = w; lineCanvas.height = h;
  const lctx = lineCanvas.getContext("2d");
  const lineImg = lctx.createImageData(w,h);
  for (let p=0, di=0; p<w*h; p++, di+=4){
    const v = lines[p];
    lineImg.data[di]=v; lineImg.data[di+1]=v; lineImg.data[di+2]=v; lineImg.data[di+3]=255;
  }
  lctx.putImageData(lineImg,0,0);
  tctx.save();
  tctx.globalCompositeOperation = "multiply";
  tctx.drawImage(lineCanvas, 0, 0);
  tctx.restore();

  // Contrast push deepens the lines a little without flattening the
  // continuous tone now underneath them into a hard-edged wash.
  applyCssFilterInPlace(tctx, w, h, `contrast(${CONFIG.SKETCH_CONTRAST}) brightness(1.05)`);

  // Tone-mapped cross-hatching: clean paper in light areas, single-
  // direction hatching in midtones, true cross-hatching in shadows — the
  // way pencil artists actually represent value/shading, driven by a
  // heavily-smoothed regional tone reference (not the line art itself),
  // so shading reflects the subject's broad value structure rather than
  // just outline density.
  applyToneHatching(tctx, w, h, tone);

  // Sketch necessarily starts from a grayscale base, which would otherwise
  // silently discard any Sepia/Duotone recolour chosen upstream. Re-apply
  // that tint HERE, to the finished sketch, so recolour still shows up
  // instead of quietly vanishing whenever Sketch is also on.
  if (fx && fx.recolor === "sepia"){
    applyCssFilterInPlace(tctx, w, h, "sepia(0.85)");
  } else if (fx && fx.recolor === "duotone"){
    applyDuotone(tctx, w, h, fx.duotoneA, fx.duotoneB);
  }

  // Intensity blends between the ORIGINAL (colour-corrected) image and the
  // finished sketch — 0 leaves the photo as-is, 100 is the full sketch,
  // and everything between is a genuine visible mix. (The old version drew
  // the sketch layer twice — once at globalAlpha=intensity, then again
  // underneath at full opacity to "fill gaps" — but since that layer was
  // fully opaque everywhere, the second draw exactly cancelled out
  // whatever the first draw's reduced alpha left transparent, so the
  // result never actually depended on intensity at all.)
  ctx.clearRect(0,0,w,h);
  ctx.drawImage(original, 0, 0);
  ctx.globalAlpha = intensity;
  ctx.drawImage(tmp, 0, 0);
  ctx.globalAlpha = 1;
}

// Builds a grayscale copy of ctx, blurs it at two radii (sigma and
// sigma*XDOG_K) via the browser's native (genuinely Gaussian per spec)
// CSS blur filter, and returns:
//   lines — the XDoG line-art layer (255 = clean paper, lower = line)
//   tone  — a much more heavily blurred grayscale, used as a smooth
//           regional darkness reference for applyToneHatching()
//
// XDoG maths: D(x) = G_sigma(x) - tau*G_(sigma*k)(x), on grayscale values
// normalised to [0,1]. In flat colour, G_sigma ≈ G_(sigma*k), so
// D ≈ (1-tau)*G(x) — since tau<1 and G>=0, this is ALWAYS >= 0, meaning a
// flat region can never misfire as a line regardless of how dark or light
// it is (verified numerically before this was implemented — see
// /home/claude/maxflow/test_xdog_math.js from development). Only where the
// two blurs genuinely diverge (a real edge) does D dip below the epsilon
// threshold, at which point a soft tanh curve (sharpness = XDOG_PHI) turns
// that into a line rather than a hard binary cut.
function computeXDoGAndTone(ctx, w, h, sigma){
  const gray = document.createElement("canvas");
  gray.width = w; gray.height = h;
  const gctx = gray.getContext("2d");
  gctx.filter = "grayscale(1)";
  gctx.drawImage(ctx.canvas, 0, 0);
  gctx.filter = "none";

  const b1 = blurredGrayValues(gray, w, h, sigma);
  const b2 = blurredGrayValues(gray, w, h, sigma*CONFIG.XDOG_K);
  const tone = blurredGrayValues(gray, w, h, sigma*CONFIG.SKETCH_TONE_BLUR_MULT);

  const n = w*h;
  const lines = new Uint8ClampedArray(n);
  const tau=CONFIG.XDOG_TAU, phi=CONFIG.XDOG_PHI, epsilon=CONFIG.XDOG_EPSILON;
  for (let p=0; p<n; p++){
    const g1=b1[p]/255, g2=b2[p]/255;
    const dog = g1 - tau*g2;
    const t = dog>=epsilon ? 1 : clamp(1+Math.tanh(phi*(dog-epsilon)), 0, 1);
    lines[p] = Math.round(t*255);
  }
  return { lines, tone };
}

function blurredGrayValues(grayCanvas, w, h, radiusPx){
  const tmp = document.createElement("canvas");
  tmp.width = w; tmp.height = h;
  const tctx = tmp.getContext("2d");
  tctx.filter = `blur(${radiusPx.toFixed(2)}px)`;
  tctx.drawImage(grayCanvas, 0, 0);
  tctx.filter = "none";
  const data = tctx.getImageData(0,0,w,h).data;
  const out = new Uint8ClampedArray(w*h);
  for (let p=0, di=0; p<w*h; p++, di+=4) out[p] = data[di]; // R=G=B after grayscale
  return out;
}

// A perfectly regular mathematical lattice (every line the same length,
// angle, and spacing) is exactly what makes hatching read as "computer
// pattern" instead of "hand-drawn" — real cross-hatching is made of many
// short, overlapping, slightly-off strokes, not one continuous perfect
// diagonal. This scatters short jittered stroke segments across a coarse
// grid of "cells" instead: each cell's strokes get a randomised position,
// angle, and length, using a deterministic hash of the cell coordinates
// (hashRandom()) rather than Math.random() — so the pattern is stable
// across re-renders (adjusting an unrelated slider won't make the hatching
// visibly "swim"), but still looks organic rather than tiled. Tiered by
// the local regional tone: clean above SKETCH_HATCH_LIGHT_THRESHOLD, one
// hatching direction between the two thresholds, both directions (a true
// cross-hatch) at/below SKETCH_HATCH_DARK_THRESHOLD.
function hashRandom(x, y, salt){
  let h = (x*374761393 + y*668265263 + salt*2246822519) >>> 0;
  h = (h ^ (h >>> 13)) >>> 0;
  h = Math.imul(h, 1274126177) >>> 0;
  h = (h ^ (h >>> 16)) >>> 0;
  return (h >>> 0) / 4294967296;
}
function applyToneHatching(ctx, w, h, toneArr){
  const spacing = CONFIG.SKETCH_HATCH_SPACING_PX;
  const lightT = CONFIG.SKETCH_HATCH_LIGHT_THRESHOLD;
  const darkT = CONFIG.SKETCH_HATCH_DARK_THRESHOLD;
  const cellSize = spacing * CONFIG.SKETCH_HATCH_CELL_MULT;
  const cols = Math.ceil(w/cellSize)+1, rows = Math.ceil(h/cellSize)+1;
  const angleJitterRad = CONFIG.SKETCH_HATCH_ANGLE_JITTER_DEG * Math.PI/180;

  ctx.save();
  ctx.lineCap = "round";
  ctx.strokeStyle = `rgba(0,0,0,${CONFIG.SKETCH_HATCH_ALPHA})`;
  ctx.lineWidth = 1;
  ctx.beginPath();

  for (let cy=0; cy<rows; cy++){
    for (let cx=0; cx<cols; cx++){
      const baseX = cx*cellSize, baseY = cy*cellSize;
      const sx = clamp(Math.round(baseX),0,w-1), sy = clamp(Math.round(baseY),0,h-1);
      const tone = toneArr[sy*w+sx];
      if (tone > lightT) continue;
      const directions = tone <= darkT ? [Math.PI/4, -Math.PI/4] : [Math.PI/4];
      for (let di=0; di<directions.length; di++){
        const baseAngle = directions[di];
        for (let s=0; s<CONFIG.SKETCH_HATCH_STROKES_PER_CELL; s++){
          const salt = di*101 + s*17;
          const jx = (hashRandom(cx,cy,salt+1)-0.5) * cellSize * 0.9;
          const jy = (hashRandom(cx,cy,salt+2)-0.5) * cellSize * 0.9;
          const angle = baseAngle + (hashRandom(cx,cy,salt+3)-0.5) * angleJitterRad * 2;
          const length = spacing * (1.6 + hashRandom(cx,cy,salt+4)*1.8);
          const px = baseX+jx, py = baseY+jy;
          const dx = Math.cos(angle)*length/2, dy = Math.sin(angle)*length/2;
          ctx.moveTo(px-dx, py-dy);
          ctx.lineTo(px+dx, py+dy);
        }
      }
    }
  }
  ctx.stroke();
  ctx.restore();
}

/* =========================================================================
   Render scheduling — simple rAF coalescing. All effects here (native CSS
   filters, XDoG sketch, posterize) are cheap enough to run
   at full resolution on every input event, so no preview/debounce split
   is needed.
   ========================================================================= */
let rafPending = false;
function scheduleRender(){
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(()=>{
    rafPending = false;
    renderComposite();
  });
}

/* =========================================================================
   Effects panel wiring
   ========================================================================= */
function bindSlider(id, valId, fxKey, onInput){
  const el = $(id), val = $(valId);
  const update = ()=>{
    const v = Number(el.value);
    state.fx[fxKey] = v;
    val.textContent = v;
    if (onInput) onInput(v);
    scheduleRender();
  };
  el.addEventListener("input", update);
  return update;
}
bindSlider("fxBrightness","vBrightness","brightness");
bindSlider("fxContrast","vContrast","contrast");
bindSlider("fxSharpen","vSharpen","sharpen");
bindSlider("fxSaturation","vSaturation","saturation");
bindSlider("fxHue","vHue","hue");
bindSlider("fxTemp","vTemp","temp");
bindSlider("fxSketchIntensity","vSketchIntensity","sketchIntensity");
bindSlider("fxPosterizeLevels","vPosterizeLevels","posterizeLevels");

$("fxRecolor").addEventListener("change", (e)=>{
  state.fx.recolor = e.target.value;
  $("duotoneRow").classList.toggle("show", e.target.value === "duotone");
  scheduleRender();
});
$("duotoneA").addEventListener("input", (e)=>{ state.fx.duotoneA = e.target.value; scheduleRender(); });
$("duotoneB").addEventListener("input", (e)=>{ state.fx.duotoneB = e.target.value; scheduleRender(); });

document.querySelectorAll(".artChoice").forEach(el=>{
  el.addEventListener("click", ()=>{
    document.querySelectorAll(".artChoice").forEach(o=>o.classList.remove("active"));
    el.classList.add("active");
    const fx = el.dataset.fx;
    state.fx.art = fx;
    ["Sketch","Posterize"].forEach(name=>{
      $("param"+name).classList.toggle("show", fx === name.toLowerCase());
    });
    scheduleRender();
  });
});

$("btnResetAll").addEventListener("click", ()=>resetFxOnly(true));
function resetFxOnly(rerender){
  state.fx = { brightness:0, contrast:0, sharpen:0, saturation:0, hue:0, temp:0,
    recolor:"none", duotoneA:"#1b1d22", duotoneB:"#c98a3b", art:"none",
    sketchIntensity:60, posterizeLevels:4 };
  ["Brightness","Contrast","Sharpen","Saturation","Hue","Temp"].forEach(n=>{
    $("fx"+n).value = 0; $("v"+n).textContent = 0;
  });
  $("fxRecolor").value = "none";
  $("duotoneRow").classList.remove("show");
  document.querySelectorAll(".artChoice").forEach(o=>o.classList.remove("active"));
  document.querySelector('.artChoice[data-fx="none"]').classList.add("active");
  document.querySelectorAll(".artParam").forEach(o=>o.classList.remove("show"));
  if (rerender) scheduleRender();
}

/* =========================================================================
   Toolbar wiring
   ========================================================================= */
document.querySelectorAll(".tbtn[data-tool]:not(#toolCrop)").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    if (!state.hasImage) return;
    if (state.tool === "crop" && state.cropRect) { state.cropRect=null; }
    setTool(btn.dataset.tool);
    drawOverlay();
  });
});
$("toolCrop").addEventListener("click", ()=>{
  if (!state.hasImage) return;
  if (hasValidCropRect()){
    applyCrop();
  } else {
    state.cropRect = null;
    setTool("crop");
    drawOverlay();
  }
});
$("brushSize").addEventListener("input", (e)=>{ state.brushSize = Number(e.target.value); });
$("btnUndo").addEventListener("click", undo);
$("btnResetMask").addEventListener("click", ()=>{
  if (!state.hasImage) return;
  pushUndo();
  mctx.clearRect(0,0,state.w,state.h);
  mctx.fillStyle = "#fff";
  mctx.fillRect(0,0,state.w,state.h);
  state.bbox = { x:0, y:0, w:state.w, h:state.h };
  seedInitialSamples(state.bbox);
  scheduleRender();
});

$("ghostToggle").addEventListener("change", (e)=>{
  state.showGhost = e.target.checked;
  scheduleRender();
});

$("btnOpen").addEventListener("click", ()=> $("fileInput").click());
$("btnPaste").addEventListener("click", pasteFromClipboardButton);
$("fileInput").addEventListener("change", async (e)=>{
  const f = e.target.files[0];
  if (!f) return;
  const img = await loadImageFromBlob(f);
  setImage(img);
});

canvasStack.addEventListener("dragover", (e)=>{ e.preventDefault(); });
canvasStack.parentElement.addEventListener("dragover", (e)=>{ e.preventDefault(); });
document.addEventListener("drop", async (e)=>{
  e.preventDefault();
  const f = [...(e.dataTransfer?.files||[])].find(f=>f.type.startsWith("image/"));
  if (f){ const img = await loadImageFromBlob(f); setImage(img); }
});

document.addEventListener("paste", async (e)=>{
  const items = e.clipboardData?.items || [];
  for (const item of items){
    if (item.type.startsWith("image/")){
      const blob = item.getAsFile();
      const img = await loadImageFromBlob(blob);
      setImage(img);
      break;
    }
  }
});

// Button-triggered clipboard paste, for anyone who finds Ctrl/Cmd+V fiddly
// (small hands, unfamiliar keyboard shortcuts, etc). Uses the async Clipboard
// API's read() rather than the "paste" event — this only works because it's
// called directly from a click handler, which counts as the user gesture
// browsers require before letting a page read the clipboard programmatically.
async function pasteFromClipboardButton(){
  try{
    const items = await navigator.clipboard.read();
    for (const item of items){
      const imgType = item.types.find(t => t.startsWith("image/"));
      if (imgType){
        const blob = await item.getType(imgType);
        const img = await loadImageFromBlob(blob);
        setImage(img);
        return;
      }
    }
    flashStatus("No image found on the clipboard.");
  }catch(err){
    flashStatus("Couldn't read the clipboard \u2014 try Ctrl/Cmd+V instead.");
  }
}

/* =========================================================================
   Export
   ========================================================================= */
async function copyPngToClipboard(){
  if (!state.hasImage) return;
  try{
    const blobPromise = new Promise(res => maskedCanvas.toBlob(res, "image/png"));
    await navigator.clipboard.write([ new ClipboardItem({ "image/png": blobPromise }) ]);
    flashStatus("Copied PNG to clipboard.");
  }catch(err){
    flashStatus("Couldn't copy automatically — try Download instead.");
  }
}
$("btnCopy").addEventListener("click", copyPngToClipboard);
$("btnDownload").addEventListener("click", ()=>{
  if (!state.hasImage) return;
  maskedCanvas.toBlob((blob)=>{
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "cutout.png";
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
  }, "image/png");
});
function flashStatus(msg){
  const prev = statusHint.textContent;
  statusHint.textContent = msg;
  setTimeout(()=>{ if (statusHint.textContent===msg) updateStatus(); }, 1800);
}

/* =========================================================================
   Init
   ========================================================================= */
updateStatus();

})();
</script>
