<!DOCTYPE html>
<html lang="en">
<!--
  SNIP & SHIFT — v1
  ==================
  Single-file browser tool for pasting an image, cropping it, removing the
  background (PowerPoint-style manual marking, no ML model), touching up the
  cutout with a paint brush, and applying non-destructive corrections /
  colour / artistic effects before copying or downloading a PNG.

  ARCHITECTURE (mirrors the layer model used in Frame by Frame)
  ---------------------------------------------------------------
  - baseCanvas   (offscreen) — the working image pixels, AFTER crop, BEFORE
                  any effects. Never touched by sliders. This is the single
                  source of truth effects are recomputed from every time.
  - maskCanvas   (offscreen) — alpha-only mask (RGB unused, alpha channel
                  carries the cutout). 255 = fully kept, 0 = fully removed.
                  Edited by: bounding box, mark-keep/mark-remove strokes,
                  and the add/remove paint brush.
  - displayCanvas (visible)  — the fully composited result: base image with
                  corrections/colour/artistic effect applied, then the mask
                  applied via 'destination-in'. Recomputed by renderComposite().
  - overlayCanvas (visible)  — sits on top of displayCanvas, transparent.
                  Only used to draw transient UI: crop handles, bbox rect,
                  in-progress brush strokes. Never touches image pixels.

  Corrections / Colour / Artistic effect values are stored as plain numbers
  in `state.fx` and are NEVER baked into baseCanvas — every render rebuilds
  the result from baseCanvas + state.fx + maskCanvas, so sliders stay live-
  adjustable at any point, same as PowerPoint's Picture Format pane.

  BACKGROUND REMOVAL ALGORITHM (see classifyRegion() and the min-cut /
  max-flow graph engine just above it: buildGridTopology(), solveMaxFlow(),
  extractSourceSide(), fitGmmLite(), unaryCost())
  ---------------------------------------------------------------
  No ML model — this is a from-scratch implementation of GrabCut, the same
  graph min-cut algorithm PowerPoint's own (pre-AI) "Remove Background" is
  built on (Rother/Kolmogorov/Blake, Microsoft Research, 2004), per Ev's
  steer after v1-v12's geodesic-flood heuristic proved not aggressive or
  reliable enough:
  1. On image load (and whenever the optional Area box is redrawn), both
     classes are auto-seeded with pixel COORDINATES: background from a ring
     just outside the box (or the four canvas corners if the box fills the
     whole image), foreground from a sparse grid across the box interior.
     Auto Keep / Auto Remove strokes add more seed pixels to whichever
     class you're drawing.
  2. Every pixel in the working region becomes a node in a graph, connected
     to its 4 neighbours (edge weight = how alike their colours are — a
     big colour jump makes a cheap/weak edge, which is what lets the final
     cut land there readily) and to two special terminal nodes, source
     (foreground) and sink (background). Each pixel's terminal edge weights
     come from a lightweight Gaussian-mixture colour model (fitGmmLite(): a
     k-means fit over the marked seed colours, treated as isotropic
     Gaussians) — how well a pixel matches the foreground model vs the
     background model. Seed pixels get a near-infinite weight toward their
     marked terminal, hard-pinning their label.
  3. solveMaxFlow() (Dinic's algorithm) finds the cheapest possible way to
     split the WHOLE graph into two pieces, one touching source, one
     touching sink — a genuine global optimum over the whole region at
     once, unlike a local flood that commits to decisions pixel-by-pixel as
     it sweeps past. extractSourceSide() reads off the result: every node
     still reachable from source is foreground, everything else is
     background. This is natively a binary decision — no threshold or
     feather is needed to make it one.
  4. classifyRegion() repeats step 2-3 for GRABCUT_ITERATIONS passes,
     refitting the colour models from the FULL current labelling (not just
     the original seeds) each time — standard GrabCut-style refinement.
  This global optimisation is what fixes the two biggest weaknesses of the
  old geodesic approach: a same-coloured patch elsewhere in the region gets
  folded in correctly by its colour evidence alone, with no need for a
  cheap spatial path to a seed: and small isolated islands are intrinsically
  expensive in this formulation (their cut perimeter usually costs more
  than the area they'd save), so they mostly never form in the first place
  rather than needing ad-hoc cleanup after the fact.
  Re-marking recomputes the WHOLE region from scratch. The paint brush
  (Keep Pen / Remove Pen) is the tool for fine manual correction afterward.

  UNDO
  ---------------------------------------------------------------
  A capped stack (MAX_UNDO_STEPS) of maskCanvas snapshots, pushed after each
  discrete action (bbox set, mark stroke, paint stroke). Corrections/colour/
  artistic sliders are not part of the undo stack — they're just numbers,
  freely adjustable, "undo" for those is simply moving the slider back.

  KNOWN v1 LIMITATIONS / ON THE HORIZON
  ---------------------------------------------------------------
  - Paint (oil-effect) artistic filter is the heaviest op; it runs on a
    downscaled preview while a slider is actively being dragged and at full
    resolution ~150ms after you let go. Large pasted images may still take
    a moment on the full-res pass.
  - No multi-image sessions — pasting a new image resets everything.
  - No crop-then-resize/rotate; crop is axis-aligned rectangle only.

  v2 CHANGE
  ---------------------------------------------------------------
  Fixed: Keep/Remove marking tools were behaving identically to the
  Restore/Erase paint brush. Cause: classifyRegion() (the actual colour-
  based segmentation) only ran once BOTH a keep stroke and a remove stroke
  had been drawn; until then, marks fell back to punching the mask directly
  under the stroke — indistinguishable from the paint brush. Since the most
  natural workflow (draw a box, paint over what you don't want) never
  produces a keep stroke, this fallback was hit almost all the time.
  Fix: seedInitialSamples() now auto-seeds both classes the moment the
  bounding box is set — background from a ring just outside the box
  (always genuinely background), foreground from a sparse grid across the
  box interior (a rough guess, refined by real marks). So the very first
  Keep or Remove stroke a person draws now triggers real classification.

  v3 CHANGES
  ---------------------------------------------------------------
  - The Area (bounding box) tool is no longer required before using the
    marking pens. seedInitialSamples() already degraded gracefully to
    "sample the four image corners for background" when there's no
    exterior band to sample (i.e. the box fills the canvas) — so on image
    load we now just seed against the WHOLE canvas automatically and drop
    straight into Auto Keep. The Area tool still exists as an optional way
    to narrow the working region for tricky images.
  - Renamed for clarity: the colour-classification pens (formerly
    "Keep"/"Remove") are now "Auto Keep"/"Auto Remove". The direct paint
    brush (formerly "Restore"/"Erase") is now "Keep Pen"/"Remove Pen".
  - Removed pixels are now shown at ~30% opacity on screen ("Show removed
    areas" toggle, on by default) so you can see what you're about to
    restore. This is purely a preview layer — renderComposite() keeps the
    clean, mask-applied result in a separate `maskedCanvas`, and that's
    what Copy PNG / Download PNG actually export, so nothing ghost-y ends
    up baked into your exported file.
  - Removed the Paint strokes artistic effect (wasn't working, and was the
    only reason the render pipeline needed a downscaled-preview / debounce
    path — that's gone too, since everything left is cheap enough to run
    at full resolution on every slider input).

  v5 CHANGE
  ---------------------------------------------------------------
  Replaced the k-means colour-centroid classifier with an edge-aware
  geodesic distance classifier (see the BACKGROUND REMOVAL ALGORITHM note
  above and classifyRegion()/geodesicDistance()). Motivation: k-means only
  compared each pixel's colour to a handful of centroids, with no notion of
  *where* other pixels were or where object edges actually fell, so marks
  didn't reliably spread through a uniform area or stop at a real edge.
  The geodesic version floods outward from actual seed pixels along
  cheapest-colour-difference paths, so it follows edges properly and
  spreads aggressively through flat colour. Also added BG_DOMINANCE (biases
  ambiguous/equidistant pixels toward removed) and an asymmetric feather
  (weightedFeather() — a low-alpha neighbour pulls harder than a high-alpha
  one pushes back), so confidently-transparent pixels carry more weight
  with their neighbours than the reverse, as requested. Seeds are now
  stored as pixel coordinates (state.fgSeeds/bgSeeds) rather than sampled
  Lab colours, since the classifier reads colour fresh from the image when
  it builds the cost field.

  v6 CHANGE
  ---------------------------------------------------------------
  Fixed: small "grid dot" artefacts left behind after Auto Keep/Remove,
  most visible around a subject against a busy background. Cause: the
  automatic interior seed grid (see seedInitialSamples()) occasionally
  plants a foreground seed on a patch of background peeking in near the
  box edges — hair gaps, shoulders, the corners of a loose box — and since
  a seed is a hard distance-0 anchor, each mis-placed one grows into its
  own tiny, fully-isolated "kept" island once the geodesic flood runs.
  Fix: removeSmallIslands() now runs a connected-component pass on the
  classified alpha before feathering, and merges any region smaller than
  MIN_ISLAND_AREA_PX into whichever class surrounds it. Real subject detail
  is untouched, since it's part of one large connected mass rather than a
  lone island. Also nudged the interior seed grid's edge inset out a bit
  (INTERIOR_SEED_INSET_FRAC) to reduce how often this happens in the first
  place.

  v7 CHANGES
  ---------------------------------------------------------------
  - Stronger, more decisive spreading: geodesicDistance()'s edge cost now
    has a noise floor (EDGE_NOISE_FLOOR) — colour differences below it
    (ordinary shading/gradients/noise) cost nothing extra, so the flood
    pushes through gentle variation (skin, fabric folds) instead of
    gradually stalling on it. Differences above the floor (real edges) are
    then multiplied up (EDGE_COST_SCALE), so the flood commits to stopping
    there rather than slowly leaking across. Also lowered the flat per-step
    floor cost and increased the sweep count (GEODESIC_PASSES) for better
    convergence with the new cost shape.
  - No more semi-transparent pixels, anywhere: classifyRegion() now hard-
    binarizes the result (every pixel snaps to fully kept or fully removed)
    after the feather/island-cleanup steps, then runs removeSmallIslands()
    a second time on that binary result to mop up any lone specks the
    snapping itself introduced. The feather pass still runs first, but only
    to bias WHERE the hard boundary lands (a transparent neighbour still
    pulls harder than an opaque one) — it's no longer the final output, so
    it can never leave a soft edge behind. This is what removes the small
    faded floating pixels that used to survive as isolated low/mid-alpha
    blobs.

  v8 CHANGE
  ---------------------------------------------------------------
  Tuned the geodesic constants further in the "spread more aggressively"
  direction: EDGE_NOISE_FLOOR doubled (6), GEODESIC_FLOOR_COST halved
  (0.15), EDGE_COST_SCALE raised (2.2), GEODESIC_PASSES raised to 4 for
  better convergence now that flat-region cost is so low. No algorithm
  changes, just pushing the same knobs from v7 further in the same
  direction — these are the constants to keep nudging if it still isn't
  aggressive enough, or to pull back if it starts overreaching into
  genuinely different objects.

  v9 CHANGE
  ---------------------------------------------------------------
  classifyRegion() no longer floods on the full-resolution image. It now
  draws the working region down to at most COST_DOWNSAMPLE_MAX_DIM on its
  longest side, runs a per-channel median filter (medianFilterLab(),
  radius MEDIAN_FILTER_RADIUS) on that smaller copy, and floods the
  geodesic distance transform there — then bilinear-upsamples the result
  (upsampleAlpha()) back to full resolution before the existing island-
  cleanup/feather/binarize pipeline runs. Two effects from one change:
  downsampling averages away fine texture for free, and the median filter
  on top removes what's left (hair strands, skin texture, fabric weave,
  JPEG noise) WITHOUT softening real edges the way a Gaussian blur would
  (a pixel next to a hard edge still takes its value from whichever side
  of the edge most of its neighbourhood sits on). It's also considerably
  faster on large pasted images, since the flood itself now runs on a much
  smaller grid. Seed pixel coordinates are scaled into the downsampled
  grid via seedsToLocalIndices()'s new `scale` parameter. The existing
  noise-floor/cost-scale constants (EDGE_NOISE_FLOOR etc.) are left as a
  light backstop rather than pushed further, since most of the actual
  denoising work has moved to this pre-filtering stage.

  v10 CHANGE
  ---------------------------------------------------------------
  Pushed spreading further again, now backed by the v9 pre-filtering
  instead of fighting raw noise directly: EDGE_NOISE_FLOOR raised (10),
  GEODESIC_FLOOR_COST lowered further (0.08), EDGE_COST_SCALE raised (3.0),
  GEODESIC_PASSES raised to 6 (affordable now that the flood runs on the
  downsampled working copy, not the full image), and MEDIAN_FILTER_RADIUS
  bumped to 3 to back up the higher noise floor with a bit more actual
  denoising. Same constants as always if this needs nudging further in
  either direction.

  v11 CHANGE
  ---------------------------------------------------------------
  Added a second classification signal alongside the geodesic one: direct
  colour similarity, independent of spatial reachability. Until now the
  entire classifier was geodesic — a pixel only counted as "close" to a
  seed if there was a cheap path to it, so two patches of near-identical
  colour that happened to be separated by an edge (a gap in hair, a second
  patch of matching background on the far side of something) wouldn't both
  get removed even though they looked the same. classifyRegion() now also
  runs a small k-means (kmeansLab(), COLOR_KMEANS_K centroids) over the fg
  and bg seed colours, and blends each pixel's plain colour-distance to
  those centroids into the same diff used for the geodesic term, weighted
  by COLOR_MATCH_WEIGHT. The geodesic term still does most of the work of
  finding and respecting edges; the colour term's job is specifically to
  catch straggling same-coloured bits the spatial flood alone can't reach.

  v12 CHANGE
  ---------------------------------------------------------------
  Targeted the JPEG-screenshot case specifically, plus a real bug in the
  island cleanup:
  - boxBlurLab() now runs BEFORE medianFilterLab(), specifically to smooth
    JPEG 8x8 DCT block seams — grid-aligned, usually-small colour jumps
    that a median filter doesn't reliably absorb on its own — so they read
    as noise (and get skipped by the edge-cost noise floor) instead of a
    tiny fenced-off region of their own.
  - Bug fix: island cleanup only ever ran at full resolution, AFTER
    upsampling the classification result back up from the small working
    grid. A single stray noisy pixel in that small grid becomes a multi-
    pixel blob after bilinear upsampling (roughly (upsample factor)^2
    pixels), which could comfortably clear the full-res cleanup threshold
    and survive as a visible speck. removeSmallIslands() now also runs on
    the small grid BEFORE upsampling (MIN_ISLAND_AREA_SMALL_PX), catching
    noise at the scale it actually occurred at.
  - Also lowered COST_DOWNSAMPLE_MAX_DIM (700 → 550) for more inherent
    smoothing from the downsampling step itself.

  v13 CHANGE — algorithm rewrite: geodesic flood → GrabCut min-cut
  ---------------------------------------------------------------
  v7-v12 kept tuning an edge-aware geodesic distance flood (see the v5-v12
  notes above for that history) — a LOCAL, greedy algorithm: each pixel
  grabs whichever path looked cheapest as a raster sweep passed over it,
  and once decided, never reconsiders. That turned out to be a real
  ceiling: it could spread through noisy/JPEG-compressed regions or get
  stuck leaving disconnected same-coloured "islands" behind, no matter how
  the noise-floor/cost-scale constants were tuned, because the algorithm
  itself has no way to reconsider a local decision in light of the whole
  region.
  Replaced entirely with a real implementation of GrabCut (Rother/
  Kolmogorov/Blake 2004) — the same graph min-cut algorithm PowerPoint's
  own pre-AI "Remove Background" uses. See the BACKGROUND REMOVAL
  ALGORITHM note above for the full description; in short: every pixel is
  a graph node, a GLOBAL min-cut/max-flow solve (Dinic's algorithm,
  implemented from scratch — buildGridTopology()/solveMaxFlow()/
  extractSourceSide()) finds the cheapest way to split the whole graph at
  once, and a lightweight Gaussian-mixture colour model (fitGmmLite()/
  unaryCost()) drives each pixel's per-terminal cost, refit and re-cut for
  GRABCUT_ITERATIONS passes. This fixes both of the geodesic approach's
  structural weaknesses directly rather than tuning around them: colour
  evidence alone (no spatial path needed) can now pull in a disconnected
  same-coloured region, and small islands are intrinsically expensive in a
  min-cut's cost structure (their boundary cost usually exceeds what
  they'd save), so they mostly stop forming rather than needing cleanup.
  All the pre/post-processing built up over v9-v12 — downsample, pre-blur,
  median filter, small-grid island cleanup, upsample, full-res island
  cleanup, asymmetric feather, hard binarize — is UNCHANGED and still runs
  around the new classifier; only the classification step itself (what was
  geodesicDistance() + the colour-blend diff formula) was replaced. Runs in
  roughly 1-1.5s at the largest working-grid size with the default 2
  iterations — noticeably slower than the geodesic flood's typical
  sub-second time, but this was tested (see /home/claude/maxflow/ during
  development) against a reference max-flow implementation on random graphs
  for correctness, and against a synthetic disconnected-same-colour-patch
  scenario to confirm it actually solves the reported problem before this
  was shipped.

  v14-v16 CHANGES
  ---------------------------------------------------------------
  v14: Sketch's recolour tint (Sepia/Duotone) is now applied to the
  finished sketch result, not run upstream and discarded the moment the
  effect converts to grayscale (see sketch()).
  v15: Ctrl/Cmd+C copies the PNG to the clipboard from anywhere in the app.
  Crop button becomes "Keep Crop" once a valid rect is drawn (Enter still
  works too). Removed the Mosaic artistic effect. Sketch got a contrast
  boost and a multiply-blended diagonal hatching texture (applyHatching())
  for a more hand-drawn look. Also fixed applyCrop() leaving state.bbox as
  null post-crop, which silently required redrawing the Area box before
  Auto Keep/Remove worked again.
  v16: classifyRegion() is now async and yields to the browser between
  stages (uiTick(), double-rAF) so a busy overlay with staged progress text
  and a bar can actually paint and update — a purely synchronous function,
  however long-running, gives the browser no chance to render anything
  until it returns, which is why large images used to look frozen rather
  than "working". Below BUSY_OVERLAY_MIN_PIXELS this is skipped entirely
  (classification is fast enough there that yielding would only add
  latency). Input is blocked (setBusy(), body.busy CSS) while a classify is
  in flight, since classifyRegion() writes to the shared mask canvas in
  stages — a new stroke or Undo mid-classify could otherwise race with it.

  v17 CHANGE — sketch effect rewrite: colour-dodge → XDoG + tone-mapped hatching
  ---------------------------------------------------------------
  Replaced the classic "grayscale + inverted-blur + colour-dodge" trick
  (an approximation of edge detection that tends to read as a soft, washed-
  out contour map) with two real techniques:
  - Line layer: XDoG (eXtended Difference-of-Gaussians — Winnemöller et al.),
    a proper edge-detection technique built specifically for stylized line
    art. Two Gaussian blurs of the grayscale image at different radii
    (native CSS blur(), genuinely Gaussian per spec) are subtracted; flat
    colour always produces a safely-positive difference regardless of how
    dark or light it is (verified numerically during development, see
    /home/claude/maxflow/test_xdog_math.js), so only real edges — where the
    two blurs diverge — cross the threshold into becoming a line. XDOG_TAU
    controls how many/bold the lines are; XDOG_PHI controls how hard-edged
    vs soft they look.
  - Shading layer: applyToneHatching() replaces the old flat, uniform
    multiply-blended hatching with tiered hatching driven by a heavily-
    blurred regional tone reference (SKETCH_TONE_BLUR_MULT) — clean paper
    above SKETCH_HATCH_LIGHT_THRESHOLD, single-direction hatching in
    midtones, true cross-hatching (both diagonal directions) at/below
    SKETCH_HATCH_DARK_THRESHOLD. This is the actual technique pencil
    artists use to represent value, rather than one pattern applied
    everywhere regardless of local tone.
  Contrast boost, Sepia/Duotone re-tinting, and the intensity-controlled
  opacity blend are all unchanged from v14/v15, just applied to the new
  line+hatch result instead of the old colour-dodge one.

  v18 CHANGES
  ---------------------------------------------------------------
  - Added a Paste button next to Open, for anyone who finds Ctrl/Cmd+V
    fiddly. Uses navigator.clipboard.read() (pasteFromClipboardButton()) —
    only usable because it's called directly from a click handler, which is
    the user-gesture browsers require before letting a page read the
    clipboard programmatically.
  - Hatching redesign: v17's applyToneHatching() used a perfectly regular
    mathematical lattice (every line the exact same length/angle/spacing),
    which read as an obvious computer-generated grid rather than a hand-
    drawn cross-hatch. Rewrote it to scatter short, jittered, overlapping
    stroke segments across a coarse cell grid instead — randomised
    position, angle (+/- SKETCH_HATCH_ANGLE_JITTER_DEG), and length per
    stroke, via a deterministic coordinate hash (hashRandom()) rather than
    Math.random(), so the pattern is stable across re-renders (nudging an
    unrelated slider won't make the hatching visibly shift) while still
    looking organic instead of tiled. All strokes are batched into a
    single path and one stroke() call for performance — tested at full
    2200x2200 scale beforehand (~63,000 strokes, ~30ms to build the path;
    see /home/claude/maxflow/test_hatch_perf.js).

  v19 CHANGE
  ---------------------------------------------------------------
  Fixed: marking an area with Auto Keep after it had previously been Auto
  Removed (or vice versa) appeared to be ignored. Cause was NOT the area
  being transparent — classifyRegion() always samples colour from the
  original unmasked image regardless of current mask state, so that was
  never the issue. The real cause: seeds accumulate for the whole session
  and never expire, so the OLD hard "definitely background" seeds from the
  first stroke were still sitting there as infinite-cost constraints,
  actively outvoting the NEW "definitely foreground" seeds in every
  classification afterward — the two marks were fighting, not the second
  one losing to transparency. Fix: finalizeMarkStroke() now calls
  removeSeedsNear() to drop any opposite-class seed within roughly the new
  stroke's brush width before classifying, so a fresh mark actually
  overrides an older conflicting one in the same spot instead of coexisting
  with it forever.

  v20 CHANGE
  ---------------------------------------------------------------
  Fixed two problems in sketch(), both traced to the same root cause: the
  final blend drew the (fully opaque) sketch layer twice — once at
  globalAlpha=intensity, then again underneath via destination-over at full
  opacity, intended to "fill gaps" at low intensity. Since the layer was
  opaque everywhere, that second draw exactly cancelled out whatever the
  first draw's reduced alpha had left transparent, so the composited result
  never actually depended on intensity at all — the slider was doing
  nothing, not because of an off-by-one but because the maths made it a
  no-op by construction.
  Also, XDoG-only line art has nothing to say between edges — no lines
  there, no hatching unless a tone tier kicks in — so all of the original
  photo's continuous shading (skin, gentle shadows, gradients) was simply
  gone, which read as "lost detail".
  Fixed by rebuilding the layer order: sketch() now snapshots the current
  image BEFORE touching ctx (`original`), builds a smooth continuous-tone
  grayscale copy of it as the base (this is what restores the lost detail),
  multiplies the XDoG line art onto that base (multiply against a mostly-
  white line layer leaves non-edge areas exactly as smooth as the
  grayscale photo — lines ADD structure instead of replacing all tone),
  then hatches and re-tints as before. The final composite now draws
  `original` first, then the finished sketch on top at globalAlpha=
  intensity — a real blend between "photo as-is" and "full sketch" across
  the whole slider range, not two draws of the same opaque layer cancelling
  out. Also dialled SKETCH_CONTRAST down (1.6 → 1.3) since the base now
  carries real continuous tone worth not flattening.

  v21 CHANGE
  ---------------------------------------------------------------
  v20's plain-grayscale base fixed the detail loss but overcorrected: a
  desaturated copy of the photo plus a thin multiplied line layer just
  reads as "grayscale photo", not "sketch" — it has none of the tonal
  character (broadly brightened midtones, natural glow/definition
  gathering around edges) that actually makes something look hand-drawn.
  Swapped the base back to the original v1 technique — colour-dodge a
  blurred, inverted copy of the grayscale onto itself — which is what
  supplies that character; XDoG stays multiplied on top of it for crisp,
  well-defined edges the colour-dodge glow alone can miss on subtler
  boundaries, and hatching/re-tint/the corrected intensity blend from v20
  are unchanged. The colour-dodge glow's inner blur radius
  (SKETCH_COLORDODGE_BLUR_PX) is now a fixed constant rather than tied to
  intensity like the original v1 code did — intensity's only job now is
  the final photo<->sketch blend, so internal effect parameters shifting
  underneath it at the same time would just be confusing.
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snip &amp; Shift</title>
<style>
  :root{
    --bg:            #1b1d22;
    --panel:         #24272e;
    --panel-raised:  #2c3039;
    --line:          #383c46;
    --ink:           #e9e8e4;
    --ink-dim:       #9a9da6;
    --accent:        #c98a3b;
    --accent-dim:    #8f6229;
    --keep:          #5fb87a;
    --remove:        #e0688a;
    --danger:        #e0688a;
    --radius:        6px;
    font-size: 15px;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow:hidden;
  }
  button{ font-family:inherit; }
  .mono{ font-family: "SF Mono", "Consolas", "Courier New", monospace; }

  #app{ display:flex; flex-direction:column; height:100%; }

  /* ---------- Header ---------- */
  header{
    display:flex; align-items:center; gap:12px;
    padding:10px 16px; background:var(--panel); border-bottom:1px solid var(--line);
    flex:0 0 auto;
  }
  header .logo{ display:flex; align-items:center; gap:8px; margin-right:8px; }
  header .logo svg{ width:22px; height:22px; }
  header h1{
    font-size:16px; font-weight:600; margin:0; letter-spacing:.02em;
  }
  header h1 span{ color:var(--accent); }
  #statusHint{
    color:var(--ink-dim); font-size:13px; margin-left:auto; text-align:right;
    max-width:46%;
  }

  /* ---------- Toolbar ---------- */
  #toolbar{
    display:flex; align-items:center; gap:6px; flex-wrap:wrap;
    padding:8px 16px; background:var(--panel); border-bottom:1px solid var(--line);
    flex:0 0 auto;
    transition: opacity .15s ease;
  }
  body.busy #toolbar{ opacity:.5; pointer-events:none; }
  body.busy #overlayCanvas{ pointer-events:none; }
  .tbtn{
    display:flex; flex-direction:column; align-items:center; gap:3px;
    background:transparent; border:1px solid transparent; color:var(--ink-dim);
    padding:6px 10px; border-radius:var(--radius); cursor:pointer; font-size:11px;
    min-width:56px;
  }
  .tbtn svg{ width:18px; height:18px; }
  .tbtn:hover{ background:var(--panel-raised); color:var(--ink); }
  .tbtn.active{ background:var(--accent-dim); color:#fff; border-color:var(--accent); }
  .tbtn:disabled{ opacity:.35; cursor:not-allowed; }
  .tbtn:disabled:hover{ background:transparent; color:var(--ink-dim); }
  .sep{ width:1px; align-self:stretch; background:var(--line); margin:2px 6px; }

  #brushSizeWrap{ display:flex; align-items:center; gap:6px; color:var(--ink-dim); font-size:12px; }
  #brushSizeWrap input[type=range]{ width:90px; }

  .pillbtn{
    background:var(--panel-raised); border:1px solid var(--line); color:var(--ink);
    padding:7px 14px; border-radius:999px; cursor:pointer; font-size:13px;
    display:flex; align-items:center; gap:6px;
  }
  .pillbtn:hover{ border-color:var(--accent); }
  .pillbtn.primary{ background:var(--accent); border-color:var(--accent); color:#1b1d22; font-weight:600; }
  .pillbtn.primary:hover{ filter:brightness(1.08); }
  .pillbtn:disabled{ opacity:.4; cursor:not-allowed; }

  /* ---------- Body layout ---------- */
  #body{ flex:1 1 auto; display:flex; min-height:0; }

  #canvasArea{
    flex:1 1 auto; position:relative; display:flex; align-items:center; justify-content:center;
    background:
      linear-gradient(45deg,#26282e 25%,transparent 25%),
      linear-gradient(-45deg,#26282e 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#26282e 75%),
      linear-gradient(-45deg,transparent 75%,#26282e 75%);
    background-size:22px 22px;
    background-position:0 0,0 11px,11px -11px,-11px 0px;
    background-color:#1f2127;
    overflow:auto;
    padding:24px;
  }
  #canvasStack{ position:relative; box-shadow:0 8px 30px rgba(0,0,0,.5); }
  #displayCanvas, #overlayCanvas{ display:block; position:absolute; top:0; left:0; }
  #overlayCanvas{ touch-action:none; cursor:crosshair; }

  #busyOverlay{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(20,21,25,.55); backdrop-filter:blur(1px);
  }
  #busyOverlay.show{ display:flex; }
  #busyCard{
    background:var(--panel-raised); border:1px solid var(--line); border-radius:10px;
    padding:18px 22px; display:flex; flex-direction:column; align-items:center; gap:10px;
    min-width:220px; box-shadow:0 10px 30px rgba(0,0,0,.4);
  }
  #busyCard .spinner{
    width:22px; height:22px; border-radius:50%; border:3px solid var(--line);
    border-top-color:var(--accent); animation:spin .7s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  #busyLabel{ font-size:13px; color:var(--ink); text-align:center; }
  #busyBarTrack{
    width:180px; height:5px; border-radius:3px; background:var(--line); overflow:hidden;
  }
  #busyBarFill{
    height:100%; width:0%; background:var(--accent); border-radius:3px;
    transition:width .18s ease;
  }
  #dropHint{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:10px; color:var(--ink-dim); text-align:center; pointer-events:none;
  }
  #dropHint strong{ color:var(--ink); font-size:18px; font-weight:600; }
  #dropHint kbd{
    background:var(--panel-raised); border:1px solid var(--line); padding:2px 7px;
    border-radius:4px; font-family:inherit; font-size:13px;
  }

  /* ---------- Side panel ---------- */
  #panel{
    width:290px; flex:0 0 auto; background:var(--panel); border-left:1px solid var(--line);
    overflow-y:auto; padding:16px;
  }
  .pgroup{ margin-bottom:22px; }
  .pgroup h2{
    font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-dim);
    margin:0 0 10px 0; font-weight:600; display:flex; align-items:center; justify-content:space-between;
  }
  .pgroup h2 button{
    background:none; border:none; color:var(--ink-dim); font-size:11px; cursor:pointer;
    text-decoration:underline; text-underline-offset:2px; padding:0;
  }
  .pgroup h2 button:hover{ color:var(--accent); }
  .row{ display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .row label{ flex:0 0 84px; font-size:12.5px; color:var(--ink-dim); }
  .row input[type=range]{ flex:1 1 auto; }
  .row .val{
    flex:0 0 34px; text-align:right; font-size:12px; color:var(--ink-dim);
  }
  select{
    width:100%; background:var(--panel-raised); color:var(--ink); border:1px solid var(--line);
    border-radius:var(--radius); padding:6px 8px; font-size:13px;
  }
  .duotoneRow{ display:none; gap:8px; margin-top:8px; }
  .duotoneRow.show{ display:flex; }
  .duotoneRow input[type=color]{
    flex:1; height:30px; border:1px solid var(--line); border-radius:var(--radius);
    background:none; padding:0; cursor:pointer;
  }
  .artChoices{ display:flex; flex-direction:column; gap:6px; }
  .artChoice{
    display:flex; align-items:center; gap:8px; padding:7px 9px; border-radius:var(--radius);
    border:1px solid var(--line); cursor:pointer; font-size:13px; color:var(--ink-dim);
  }
  .artChoice:hover{ border-color:var(--accent); }
  .artChoice.active{ border-color:var(--accent); color:var(--ink); background:var(--panel-raised); }
  .artParam{ display:none; margin-top:8px; }
  .artParam.show{ display:block; }
  input[type=range]{ accent-color:var(--accent); }
  .exportBtns{ display:flex; flex-direction:column; gap:8px; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="6" cy="6" r="3" stroke="#c98a3b" stroke-width="1.6"/>
        <circle cx="6" cy="18" r="3" stroke="#c98a3b" stroke-width="1.6"/>

    </button>
    <button class="tbtn" id="btnPaste" title="Paste image from clipboard">
      <svg viewBox="0 0 24 24" fill="none"><rect x="6" y="3" width="12" height="4" rx="1" stroke="currentColor" stroke-width="1.6"/><path d="M6 5H5a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>

      Auto Keep
    </button>
    <button class="tbtn" id="toolRemove" data-tool="markRemove" title="Auto remove pen — line/click removes similar-coloured areas">
      <svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="#e0688a" stroke-width="2" stroke-linecap="round"/></svg>
      Auto Remove
    </button>
    <button class="tbtn" id="toolBrushAdd" data-tool="brushAdd" title="Keep pen — paints kept areas directly">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 20l1.5-5L16 4.5a2 2 0 0 1 3 3L8.5 18 4 20z" stroke="#5fb87a" stroke-width="1.6" stroke-linejoin="round"/></svg>
      Keep Pen
    </button>
    <button class="tbtn" id="toolBrushRemove" data-tool="brushRemove" title="Remove pen — paints removed areas directly">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 20l1.5-5L16 4.5a2 2 0 0 1 3 3L8.5 18 4 20z" stroke="#e0688a" stroke-width="1.6" stroke-linejoin="round"/></svg>

    <div id="brushSizeWrap">

    <div class="sep"></div>
    <label id="ghostToggleWrap" style="display:flex;align-items:center;gap:6px;color:var(--ink-dim);font-size:12px;cursor:pointer;">
      <input type="checkbox" id="ghostToggle" checked>

    </label>

    <div class="sep"></div>
    <button class="tbtn" id="btnUndo" title="Undo (Ctrl+Z)">
      <svg viewBox="0 0 24 24" fill="none"><path d="M9 8L4 12l5 4M4 12h11a5 5 0 0 1 0 10h-1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Undo
    </button>
    <button class="tbtn" id="btnResetMask" title="Reset removal (keep everything)">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 4v6h6M20 20v-6h-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 15a8 8 0 0 0 14.5 3.5M19 9A8 8 0 0 0 4.5 5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      Reset
    </button>

    <div style="flex:1"></div>
    <button class="pillbtn" id="btnCopy" title="Copy PNG to clipboard">Copy PNG</button>
    <button class="pillbtn primary" id="btnDownload" title="Download PNG">Download PNG</button>
  </div>

  <div id="body">
    <div id="canvasArea">
      <div id="dropHint">
        <strong>Paste, drop, or open an image</strong>
        <span>Clipboard paste works anywhere on this page &mdash; <kbd>Ctrl</kbd>+<kbd>V</kbd></span>

      <div id="canvasStack">

      <div class="pgroup">

        <div class="row"><label>Contrast</label><input type="range" id="fxContrast" min="-100" max="100" value="0"><span class="val mono" id="vContrast">0</span></div>
        <div class="row"><label>Sharpen</label><input type="range" id="fxSharpen" min="-100" max="100" value="0"><span class="val mono" id="vSharpen">0</span></div>
